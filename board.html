<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Super Minds · Доска</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;font-family:'Nunito',sans-serif;background:#e9dfca}
  button,select{font-family:inherit;cursor:pointer}
  #bar{position:fixed;top:0;left:0;right:0;height:56px;background:#7c2340;display:flex;align-items:center;gap:6px;padding:0 10px;z-index:20;box-shadow:0 2px 8px rgba(0,0,0,.2);overflow-x:auto}
  #bar a.home{color:#fff;font-weight:800;font-size:14px;text-decoration:none;background:rgba(255,255,255,.14);padding:8px 12px;border-radius:999px;white-space:nowrap}
  .tool{background:rgba(255,255,255,.12);border:2px solid transparent;color:#fff;font-weight:800;font-size:15px;padding:8px 12px;border-radius:12px;white-space:nowrap}
  .tool.on{background:#fff;color:#7c2340;border-color:#fff}
  .sep{width:1px;height:30px;background:rgba(255,255,255,.25);margin:0 4px;flex:none}
  .sw{width:26px;height:26px;border-radius:50%;border:2px solid #fff;flex:none;cursor:pointer}
  .sw.on{outline:3px solid #ffd27a;outline-offset:1px}
  .size{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;flex:none}
  .size.on{background:#fff}
  .size i{display:block;border-radius:50%;background:#fff}
  .size.on i{background:#7c2340}
  select{background:rgba(255,255,255,.14);color:#fff;border:none;border-radius:10px;padding:8px;font-weight:800;font-size:13px}
  select option{color:#1c1310}
  #live{margin-left:auto;display:flex;align-items:center;gap:6px;flex:none}
  #status{color:#fff;font:800 12px 'Nunito',sans-serif;background:rgba(255,255,255,.14);padding:7px 12px;border-radius:999px;white-space:nowrap}
  #status .dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:#f0c96b;margin-right:5px;vertical-align:middle}
  #status.on .dot{background:#7ee787}
  #invite{background:#e0952a;color:#fff}

  #board{position:fixed;top:56px;left:0;right:0;bottom:0;background:
    linear-gradient(#00000008 1px,transparent 1px),
    linear-gradient(90deg,#00000008 1px,transparent 1px);
    background-size:28px 28px;background-color:#fdfaf0;touch-action:none}
  #ink{position:absolute;inset:0;z-index:1}
  #overlay{position:absolute;inset:0;z-index:2;pointer-events:none}
  .card{position:absolute;pointer-events:auto;background:#fff;border:2px solid #e3d3ba;border-radius:16px;padding:8px 10px;box-shadow:0 4px 10px rgba(0,0,0,.12);text-align:center;cursor:grab;user-select:none;min-width:76px}
  .card .em{font-size:34px;line-height:1}
  .card .en{font:800 15px 'Nunito',sans-serif;color:#7c2340;margin-top:2px}
  .card .x{position:absolute;top:-9px;right:-9px;width:20px;height:20px;border-radius:50%;background:#c0392b;color:#fff;font-size:13px;border:none;display:none}
  .card:hover .x{display:block}
  .tbox{position:absolute;pointer-events:auto;font:800 24px 'Fredoka',sans-serif;color:#1c1310;background:transparent;border:1px dashed transparent;padding:2px 4px;min-width:20px;cursor:grab;outline:none}
  .tbox:focus{border-color:#7c2340;cursor:text}
  .hint{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:#fff;border-radius:999px;padding:7px 16px;font:700 12px 'Nunito',sans-serif;color:#8a7a68;box-shadow:0 3px 10px rgba(0,0,0,.1);z-index:15}
</style>
</head>
<body>
  <div id="bar">
    <a class="home" href="course.html">← Домой</a>
    <span class="sep"></span>
    <button class="tool on" id="tPen">✏️</button>
    <button class="tool" id="tErase">🩹</button>
    <button class="tool" id="tText">🔤</button>
    <span class="sep"></span>
    <span id="palette" style="display:flex;gap:6px;align-items:center"></span>
    <span id="sizes" style="display:flex;gap:6px;align-items:center"></span>
    <span class="sep"></span>
    <select id="unitSel"></select>
    <button class="tool" id="addCards">＋ Слова</button>
    <span class="sep"></span>
    <button class="tool" id="undo">↩️</button>
    <button class="tool" id="clear">🧹</button>
    <button class="tool" id="save">💾</button>
    <span id="live">
      <span id="status"><span class="dot"></span><span id="statusTxt">подключение…</span></span>
      <button class="tool" id="invite">🔗 Позвать</button>
    </span>
  </div>

  <div id="board">
    <canvas id="ink"></canvas>
    <div id="overlay"></div>
  </div>
  <div class="hint" id="hint">Рисуй · перетаскивай карточки · 🔊 нажми на карточку · «Позвать» — пригласить ученика на эту же доску</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="words.js"></script>
  <script>
    /* ---------- параметры ---------- */
    const COLORS=["#1c1310","#7c2340","#c0392b","#e67e22","#27ae60","#2980b9","#8e44ad","#ffffff"];
    const SIZES=[3,6,12];
    let tool="pen", color="#1c1310", size=6;

    /* ---------- комната ---------- */
    const params=new URLSearchParams(location.search);
    let room=params.get("room");
    if(!room){ room=Math.random().toString(36).slice(2,7).toUpperCase();
      history.replaceState(null,"","?room="+room); }

    /* ---------- Supabase Realtime ---------- */
    const SB_URL="https://kdzpmbuohfjbtjpqrdfx.supabase.co";
    const SB_KEY="sb_publishable_K8vhCVG_jiEyHYQOgp3XWQ_bWobdeBG";
    let channel=null, online=false;
    function setStatus(txt,on){document.getElementById("statusTxt").textContent=txt;document.getElementById("status").classList.toggle("on",!!on);}
    (function initRealtime(){
      try{
        const sb=window.supabase.createClient(SB_URL,SB_KEY,{realtime:{params:{eventsPerSecond:40}}});
        channel=sb.channel("board:"+room,{config:{broadcast:{self:false}}});
        channel.on("broadcast",{event:"op"},({payload})=>applyRemote(payload));
        channel.subscribe((st)=>{
          if(st==="SUBSCRIBED"){online=true;setStatus("комната "+room,true);send({t:"hello"});}
          else if(st==="CHANNEL_ERROR"||st==="TIMED_OUT"){online=false;setStatus("оффлайн",false);}
        });
      }catch(e){setStatus("оффлайн",false);}
    })();
    function send(op){ if(channel&&online){try{channel.send({type:"broadcast",event:"op",payload:op});}catch(e){}} }

    document.getElementById("invite").onclick=()=>{
      const url=location.origin+location.pathname+"?room="+room;
      if(navigator.clipboard){navigator.clipboard.writeText(url).then(()=>alert("Ссылка на доску скопирована!\nОтправь её ученику:\n\n"+url),()=>prompt("Скопируй ссылку для ученика:",url));}
      else prompt("Скопируй ссылку для ученика:",url);
    };

    /* ---------- холст ---------- */
    const board=document.getElementById("board"), overlay=document.getElementById("overlay");
    const canvas=document.getElementById("ink"), ctx=canvas.getContext("2d");
    function fit(){ const r=board.getBoundingClientRect(); let img=null;
      try{img=canvas.width?ctx.getImageData(0,0,canvas.width,canvas.height):null;}catch(e){}
      canvas.width=r.width; canvas.height=r.height; ctx.lineCap="round"; ctx.lineJoin="round";
      if(img)try{ctx.putImageData(img,0,0);}catch(e){}
    }
    fit(); window.addEventListener("resize",fit);

    const pal=document.getElementById("palette");
    COLORS.forEach(c=>{const b=document.createElement("button");b.className="sw"+(c===color?" on":"");b.style.background=c;
      b.onclick=()=>{color=c;tool="pen";syncTools();[...pal.children].forEach(x=>x.classList.remove("on"));b.classList.add("on");};pal.appendChild(b);});
    const sz=document.getElementById("sizes");
    SIZES.forEach(s=>{const b=document.createElement("button");b.className="size"+(s===size?" on":"");const i=document.createElement("i");i.style.width=s+2+"px";i.style.height=s+2+"px";b.appendChild(i);
      b.onclick=()=>{size=s;[...sz.children].forEach(x=>x.classList.remove("on"));b.classList.add("on");};sz.appendChild(b);});

    function syncTools(){document.getElementById("tPen").classList.toggle("on",tool==="pen");
      document.getElementById("tErase").classList.toggle("on",tool==="erase");
      document.getElementById("tText").classList.toggle("on",tool==="text");}
    document.getElementById("tPen").onclick=()=>{tool="pen";syncTools();};
    document.getElementById("tErase").onclick=()=>{tool="erase";syncTools();};
    document.getElementById("tText").onclick=()=>{tool="text";syncTools();};

    /* рисование локально + трансляция */
    function seg(x0,y0,x1,y1,c,w,erase){
      ctx.globalCompositeOperation=erase?"destination-out":"source-over";
      ctx.strokeStyle=c;ctx.lineWidth=w;ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.stroke();
      ctx.globalCompositeOperation="source-over";
    }
    let drawing=false,last=null;
    const undoStack=[];
    function pushUndo(){try{undoStack.push(ctx.getImageData(0,0,canvas.width,canvas.height));if(undoStack.length>25)undoStack.shift();}catch(e){}}
    function pos(e){const r=canvas.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};}
    canvas.addEventListener("pointerdown",e=>{
      if(tool==="text"){placeText(e);return;}
      drawing=true;pushUndo();last=pos(e);
      const w=tool==="erase"?size*4:size;
      seg(last.x,last.y,last.x,last.y,color,w,tool==="erase");
      send({t:"d",a:last.x,b:last.y,c:last.x,d:last.y,k:color,w:w,e:tool==="erase"?1:0});
    });
    canvas.addEventListener("pointermove",e=>{if(!drawing)return;const p=pos(e);const w=tool==="erase"?size*4:size;
      seg(last.x,last.y,p.x,p.y,color,w,tool==="erase");
      send({t:"d",a:last.x,b:last.y,c:p.x,d:p.y,k:color,w:w,e:tool==="erase"?1:0});last=p;});
    window.addEventListener("pointerup",()=>{drawing=false;});

    document.getElementById("undo").onclick=()=>{const img=undoStack.pop();if(img)ctx.putImageData(img,0,0);};
    document.getElementById("clear").onclick=()=>{if(confirm("Очистить всю доску?")){doClear();send({t:"clear"});}};
    function doClear(){pushUndo();ctx.clearRect(0,0,canvas.width,canvas.height);overlay.innerHTML="";cards={};texts={};}
    document.getElementById("save").onclick=()=>{
      const out=document.createElement("canvas");out.width=canvas.width;out.height=canvas.height;const o=out.getContext("2d");
      o.fillStyle="#fdfaf0";o.fillRect(0,0,out.width,out.height);o.drawImage(canvas,0,0);
      const a=document.createElement("a");a.download="board.png";a.href=out.toDataURL("image/png");a.click();
    };

    /* ---------- карточки ---------- */
    function speak(x){try{const u=new SpeechSynthesisUtterance(x);u.lang="en-US";u.rate=.9;speechSynthesis.cancel();speechSynthesis.speak(u);}catch(e){}}
    let cards={}, texts={};
    function genId(){return Math.random().toString(36).slice(2,8);}
    const sel=document.getElementById("unitSel");
    SM_UNITS.forEach(u=>{const o=document.createElement("option");o.value=u.id;o.textContent=u.emoji+" "+u.title;sel.appendChild(o);});

    function makeCard(id,d){ // d:{en,emoji,x,y}
      if(cards[id])return cards[id];
      const c=document.createElement("div");c.className="card";c.style.left=d.x+"px";c.style.top=d.y+"px";
      c.innerHTML='<button class="x">✕</button><div class="em">'+d.emoji+'</div><div class="en">'+d.en+'</div>';
      overlay.appendChild(c);cards[id]={el:c,d:d};
      c.querySelector(".x").onclick=ev=>{ev.stopPropagation();c.remove();delete cards[id];send({t:"cr",id:id});};
      draggable(c,()=>speak(d.en),(x,y)=>{d.x=x;d.y=y;send({t:"cm",id:id,x:x,y:y});});
      return c;
    }
    document.getElementById("addCards").onclick=()=>{
      const u=SM_UNITS.find(x=>x.id===sel.value);if(!u)return;
      u.words.slice(0,8).forEach((w,i)=>{const id=genId();const d={en:w.en,emoji:w.emoji,x:40+(i%4)*100,y:30+Math.floor(i/4)*110};
        makeCard(id,d);send({t:"ca",id:id,d:d});});
    };

    /* ---------- текст ---------- */
    function makeText(id,d){ // d:{x,y,color,text}
      if(texts[id])return texts[id];
      const t=document.createElement("div");t.className="tbox";t.contentEditable="true";t.style.color=d.color;
      t.style.left=d.x+"px";t.style.top=d.y+"px";t.textContent=d.text;
      overlay.appendChild(t);texts[id]={el:t,d:d};
      draggable(t,()=>t.focus(),(x,y)=>{d.x=x;d.y=y;send({t:"tm",id:id,x:x,y:y});},true);
      t.addEventListener("input",()=>{d.text=t.textContent;send({t:"te",id:id,text:d.text});});
      return t;
    }
    function placeText(e){
      const id=genId();const d={x:e.clientX-board.getBoundingClientRect().left,y:e.clientY-board.getBoundingClientRect().top-16,color:color,text:"текст"};
      const t=makeText(id,d);send({t:"ta",id:id,d:d});
      setTimeout(()=>t.focus(),10);tool="pen";syncTools();
    }

    /* ---------- перетаскивание ---------- */
    function draggable(el,onTap,onMove,isText){
      let sx,sy,ox,oy,moved,dragging=false;
      el.addEventListener("pointerdown",e=>{
        if(isText&&document.activeElement===el)return;
        dragging=true;moved=false;sx=e.clientX;sy=e.clientY;ox=parseFloat(el.style.left)||0;oy=parseFloat(el.style.top)||0;
        el.setPointerCapture(e.pointerId);el.style.cursor="grabbing";e.stopPropagation();
      });
      el.addEventListener("pointermove",e=>{if(!dragging)return;const dx=e.clientX-sx,dy=e.clientY-sy;
        if(Math.abs(dx)+Math.abs(dy)>4)moved=true;const nx=ox+dx,ny=oy+dy;el.style.left=nx+"px";el.style.top=ny+"px";if(onMove)onMove(nx,ny);});
      el.addEventListener("pointerup",()=>{dragging=false;el.style.cursor="grab";if(!moved&&onTap)onTap();});
    }

    /* ---------- приём событий ---------- */
    function applyRemote(op){
      switch(op.t){
        case "d": seg(op.a,op.b,op.c,op.d,op.k,op.w,op.e); break;
        case "clear": doClear(); break;
        case "ca": makeCard(op.id,op.d); break;
        case "cm": if(cards[op.id]){cards[op.id].el.style.left=op.x+"px";cards[op.id].el.style.top=op.y+"px";cards[op.id].d.x=op.x;cards[op.id].d.y=op.y;} break;
        case "cr": if(cards[op.id]){cards[op.id].el.remove();delete cards[op.id];} break;
        case "ta": makeText(op.id,op.d); break;
        case "tm": if(texts[op.id]){texts[op.id].el.style.left=op.x+"px";texts[op.id].el.style.top=op.y+"px";} break;
        case "te": if(texts[op.id]){texts[op.id].el.textContent=op.text;texts[op.id].d.text=op.text;} break;
        case "hello": sendSnapshot(); break;
        case "snap": applySnapshot(op); break;
      }
    }
    function sendSnapshot(){
      let img="";try{img=canvas.toDataURL("image/png");}catch(e){}
      const cs={},ts={};Object.keys(cards).forEach(id=>cs[id]=cards[id].d);Object.keys(texts).forEach(id=>ts[id]=texts[id].d);
      send({t:"snap",img:img,cards:cs,texts:ts});
    }
    let gotSnap=false;
    function applySnapshot(op){
      if(gotSnap)return;gotSnap=true;
      if(op.img){const im=new Image();im.onload=()=>ctx.drawImage(im,0,0);im.src=op.img;}
      if(op.cards)Object.keys(op.cards).forEach(id=>makeCard(id,op.cards[id]));
      if(op.texts)Object.keys(op.texts).forEach(id=>makeText(id,op.texts[id]));
    }
  </script>
</body>
</html>
