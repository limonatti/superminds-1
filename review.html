<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Мои слова · English with Asya</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:#f4e9d8;font-family:'Fredoka',sans-serif;color:#1c1310;min-height:100vh}
  .wrap{max-width:640px;margin:0 auto;padding:64px 16px 60px}
  .home{position:fixed;top:12px;left:12px;z-index:9;background:#7c2340;color:#fff;padding:9px 16px;border-radius:999px;font:800 14px 'Nunito',sans-serif;box-shadow:0 4px 0 #e3d3ba;text-decoration:none}
  h1{text-align:center;font-size:30px;margin:6px 0 2px;color:#7c2340}
  .sub{text-align:center;margin:6px 0 18px;font:800 14px 'Nunito',sans-serif;color:#5a4f47}
  .card{background:#fff;border-radius:22px;box-shadow:0 8px 0 #e3d3ba;padding:24px;text-align:center}
  .big{font-size:64px;line-height:1;margin:6px 0}
  .qt{font-size:24px;font-weight:700;color:#7c2340;margin:8px 0 14px}
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .opt{background:#fdfbf7;border:2px solid #e3d3ba;border-radius:14px;padding:14px;font-size:17px;font-weight:600;cursor:pointer}
  .opt.correct{background:#dff0d2;border-color:#7cb342;color:#3f7a20}
  .opt.wrong{background:#fbe0d8;border-color:#e07a5f;color:#a23b1e}
  .prog{font:900 14px 'Nunito',sans-serif;color:#5a4f47;text-align:center;margin:12px 0}
  .primary{background:#7c2340;color:#fff;border:0;border-radius:14px;padding:14px 24px;font:800 15px 'Nunito',sans-serif;cursor:pointer;box-shadow:0 4px 0 #e3d3ba;margin-top:12px}
  .empty{background:#fff;border-radius:22px;box-shadow:0 8px 0 #e3d3ba;padding:26px;text-align:center;font:700 14px 'Nunito',sans-serif;color:#8a7a68}
  .empty a{color:#7c2340;font-weight:900}
  .boxrow{display:flex;gap:6px;justify-content:center;margin:10px 0 0;font:800 12px 'Nunito',sans-serif;color:#8a7a68;flex-wrap:wrap}
  .boxrow span{background:#fff;border:2px solid #e3d3ba;border-radius:999px;padding:4px 10px}
  .cfp{position:fixed;top:-40px;z-index:99;pointer-events:none;animation:cfall linear forwards}
  @keyframes cfall{to{transform:translateY(115vh) rotate(720deg)}}
  .foot{text-align:center;font:700 13px 'Nunito',sans-serif;color:#8a7a68;margin-top:26px}
</style>
</head>
<body>
  <a class="home" href="units.html">← Юниты</a>
  <div class="wrap">
    <h1>🧠 Мои слова</h1>
    <div class="sub">умное повторение: платформа сама знает, что пора повторить</div>
    <div id="root"><div class="empty">Загрузка…</div></div>
    <div class="foot">Made for @english.with_asya</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="words.js"></script>
  <script src="sm-auth.js"></script>
  <script>
    function esc(s){return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
    function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
    function say(t){if(window.SM_speak)return SM_speak(t);try{const u=new SpeechSynthesisUtterance(t);u.lang="en-US";u.rate=.9;speechSynthesis.cancel();speechSynthesis.speak(u);}catch(e){}}
    function confetti(){const em=["🎉","✨","⭐","🎊"];for(let i=0;i<24;i++){const sp=document.createElement("span");sp.className="cfp";sp.textContent=em[i%em.length];sp.style.left=(Math.random()*100)+"vw";sp.style.fontSize=(15+Math.random()*20)+"px";sp.style.animationDuration=(1.5+Math.random()*1.8)+"s";document.body.appendChild(sp);setTimeout(()=>sp.remove(),4000);}}
    const root=document.getElementById("root");
    const byId={};SM_ALL_WORDS.forEach(w=>byId[w.id]=w);

    function distract(w,n){
      const seen={};seen[(w.en||"").toLowerCase()]=1;const out=[];
      const pool=shuffle(SM_ALL_WORDS.filter(x=>x.unitId===w.unitId)).concat(shuffle(SM_ALL_WORDS));
      for(const x of pool){const k=(x.en||"").toLowerCase();if(seen[k])continue;seen[k]=1;out.push(x);if(out.length>=n)break;}
      return out;
    }

    let deck=[],idx=0,good=0;
    async function build(){
      const u=await SM.getUser();
      if(!u){root.innerHTML='<div class="empty">Войди в свой <a href="cabinet.html">кабинет</a> — и платформа будет запоминать твои слова.</div>';return;}
      const p=await SM.loadProgress();
      const now=Date.now();
      const due=[],weak=[];
      SM_ALL_WORDS.forEach(w=>{
        const e=p[w.id];if(!e||!e.seen)return;
        if(typeof e.due==="number"&&e.due<=now&&(e.b||0)<5)due.push({w,e});
        else if(e.seen>=2&&(e.correct||0)/e.seen<0.6)weak.push({w,e});
      });
      due.sort((a,b)=>(a.e.due||0)-(b.e.due||0));
      let list=due.map(x=>x.w);
      if(list.length<10)list=list.concat(shuffle(weak.map(x=>x.w)).filter(w=>!list.includes(w)));
      list=list.slice(0,10);
      if(!list.length){
        root.innerHTML='<div class="empty"><div style="font-size:52px">🌞</div>На сегодня всё повторено!<br>Поиграй в <a href="units.html">тренажёре или играх</a> — и завтра здесь появятся слова для повторения.</div>';
        return;
      }
      deck=list;idx=0;good=0;round_();
    }
    function round_(){
      if(idx>=deck.length){end_();return;}
      const w=deck[idx];
      const enFirst=Math.random()<0.5;
      const opts=shuffle([w,...distract(w,3)]);
      root.innerHTML='<div class="prog">'+(idx+1)+' из '+deck.length+'</div>'+
        '<div class="card"><div class="big">'+(enFirst?SM_face(w,72):"🤔")+'</div>'+
        '<div class="qt">'+(enFirst?esc(w.en):esc(w.ru))+'</div>'+
        (enFirst?'<button class="opt" style="margin-bottom:10px" onclick="(function(){})()" id="ls">🔊</button>':'')+
        '<div class="opts" id="op"></div></div>';
      if(enFirst){document.getElementById("ls").onclick=()=>say(w.en);}
      const op=document.getElementById("op");let done=false;
      opts.forEach(o=>{
        const b=document.createElement("button");b.className="opt";
        b.textContent=enFirst?o.ru:o.en;
        b.onclick=()=>{
          if(done)return;done=true;
          const ok=o.id===w.id;
          try{SM.srsQueue(w.id,ok);}catch(e){}
          if(ok){b.classList.add("correct");good++;say(w.en);}
          else{b.classList.add("wrong");const t=enFirst?w.ru:w.en;const cb=[...op.children].find(x=>x.textContent===t);if(cb)cb.classList.add("correct");say(w.en);}
          setTimeout(()=>{idx++;round_();},ok?700:1400);
        };
        op.appendChild(b);
      });
    }
    async function end_(){
      try{await SM.srsFlush();}catch(e){}
      root.innerHTML='<div class="card"><div class="big">'+(good>=deck.length*0.7?"🏆":"🧠")+'</div>'+
        '<h2 style="color:#7c2340;margin:6px 0">'+good+' из '+deck.length+'</h2>'+
        '<div class="boxrow"><span>Слова, где были ошибки, вернутся быстрее</span><span>Выученные — реже</span></div>'+
        '<button class="primary" id="more">Продолжить повторение</button></div>';
      document.getElementById("more").onclick=build;
      if(good>=deck.length*0.7)confetti();
    }
    build();
  </script>
</body>
</html>
