<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English with Asya · Мои учебники</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#f4e9d8;font-family:'Fredoka',sans-serif;color:#1c1310;min-height:100vh}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none}
  .wrap{max-width:900px;margin:0 auto;padding:44px 24px 60px}
  .top{display:flex;justify-content:flex-end;gap:10px;margin-bottom:6px}
  .pill{background:#fff;color:#7c2340;font:800 14px 'Nunito',sans-serif;padding:10px 18px;border-radius:999px;box-shadow:0 5px 0 #e3d3ba;display:inline-flex;align-items:center;gap:7px}
  .head{text-align:center;margin-bottom:30px}
  h1{margin:0;font-size:clamp(32px,7vw,54px);font-weight:700;color:#7c2340;letter-spacing:-1px}
  .sub{font:800 16px 'Nunito',sans-serif;color:#5a4f47;margin:10px 0 0}
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:22px}
  .course{background:#fff;border-radius:28px;padding:26px 22px;box-shadow:0 8px 0 #e3d3ba;text-align:center;transition:transform .14s,box-shadow .14s;cursor:pointer;position:relative}
  .course.ready:hover{transform:translateY(-6px);box-shadow:0 16px 22px rgba(124,35,64,.14)}
  .course.soon{opacity:.72}
  .cover{width:104px;height:104px;border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:54px;margin:0 auto 16px}
  .course .t{font-size:22px;font-weight:700;margin:2px 0 4px}
  .course .s{font:800 12.5px 'Nunito',sans-serif;color:#8a7a68;margin-bottom:16px;min-height:32px}
  .go{background:#7c2340;color:#fff;font:800 14px 'Nunito',sans-serif;padding:10px 22px;border-radius:999px;display:inline-block}
  .badge{position:absolute;top:14px;right:14px;background:#f0c96b;color:#7a5b12;font:900 10px 'Nunito',sans-serif;padding:4px 9px;border-radius:999px;letter-spacing:.5px}
  .tools{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:26px}
  .tbtn{font:800 15px 'Nunito',sans-serif;padding:13px 24px;border-radius:999px;color:#fff}
  .board{background:#7c2340;box-shadow:0 6px 0 #5e1a30}
  .foot{text-align:center;font:700 13px 'Nunito',sans-serif;color:#8a7a68;margin-top:40px}
  @media(max-width:760px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a class="pill" href="teacher.html">👩‍🏫 Кабинет учителя</a>
      <a class="pill" href="cabinet.html">👤 Кабинет ученика</a>
    </div>
    <div class="head">
      <img src="https://d8j0ntlcm91z4.cloudfront.net/user_3F1b5KRx5p4EogfpaQRR3sEXIP5/hf_20260713_054522_5c0f8f0e-e44d-4299-96e9-adf0cbae9bed.png" alt="" style="width:150px;height:150px;object-fit:contain;display:block;margin:0 auto 4px">
      <h1>🎓 English with Asya</h1>
      <div class="sub">Мои учебники — выбери курс</div>
    </div>
    <div class="grid" id="grid"></div>
    <div class="tools">
      <a class="tbtn board" href="board.html">🧑‍🏫 Доска для урока</a>
    </div>
    <div class="foot">Made for @english.with_asya · англ + рус · для детей 6–8</div>
  </div>

  <script src="words.js"></script>
  <script>
    const grid=document.getElementById("grid");
    SM_COURSES.forEach(c=>{
      const el=document.createElement("div");
      el.className="course "+(c.ready?"ready":"soon");
      el.innerHTML=
        (c.ready?'':'<div class="badge">СКОРО</div>')+
        '<div class="cover" style="background:'+c.color+'">'+(c.img?'<img src="'+c.img+'" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:24px">':c.emoji)+'</div>'+
        '<div class="t">'+c.title+'</div>'+
        '<div class="s">'+c.subtitle+'</div>'+
        '<div class="go">'+(c.ready?'Открыть →':'Добавить вместе')+'</div>';
      el.onclick=()=>{
        if(c.ready){ try{localStorage.setItem("sm-course",c.id);}catch(e){} location.href="course.html"; }
        else if(c.admin){ location.href="admin.html"; }
        else { alert("Этот учебник ещё не добавлен. Напиши мне — добавим его вместе, по чуть-чуть! 🙂"); }
      };
      grid.appendChild(el);
    });
    /* Курсы Speakout — прямые ссылки на тренажёры */
    const EXTRA=[
      {title:"Speakout B1+",subtitle:"3rd edition · курс по юнитам",img:"https://d8j0ntlcm91z4.cloudfront.net/user_3F1b5KRx5p4EogfpaQRR3sEXIP5/hf_20260723_065850_052fe4a4-4e77-4ea3-b2fa-735727fc46b1.png",color:"#0e2c3f",href:"speakout-b1plus-course.html"},
      {title:"Speakout B1",subtitle:"3rd edition · тренажёр по юнитам",emoji:"💬",color:"#f6e2cf",href:"speakout-b1.html"}
    ];
    EXTRA.forEach(c=>{
      const el=document.createElement("div");
      el.className="course ready";
      el.innerHTML='<div class="cover" style="background:'+c.color+'">'+(c.img?'<img src="'+c.img+'" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:24px">':c.emoji)+'</div>'+
        '<div class="t">'+c.title+'</div>'+
        '<div class="s">'+c.subtitle+'</div>'+
        '<div class="go">Открыть →</div>';
      el.onclick=()=>{ location.href=c.href; };
      grid.appendChild(el);
    });
  </script>
</body>
</html>
