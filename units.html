<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Юниты · English with Asya</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#f4e9d8;font-family:'Fredoka',sans-serif;color:#1c1310}
  a{color:inherit;text-decoration:none}
  .home{position:fixed;top:12px;left:12px;z-index:9;background:#7c2340;color:#fff;padding:9px 16px;border-radius:999px;font:800 14px 'Nunito',sans-serif;box-shadow:0 4px 0 #e3d3ba}
  .wrap{max-width:820px;margin:0 auto;padding:0 0 56px}
  .head{padding:52px 24px 8px;text-align:center}
  h1{margin:2px 0 0;font-size:clamp(30px,6vw,46px);font-weight:700;color:#7c2340;letter-spacing:-1px}
  .sub{margin:12px 0 0;font:800 15px 'Nunito',sans-serif;color:#5a4f47}
  .list{padding:16px 24px 0;display:flex;flex-direction:column;gap:14px}
  .unit{background:#fff;border-radius:22px;box-shadow:0 6px 0 #e3d3ba;padding:16px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .unit .ue{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;flex:none}
  .unit .info{flex:1;min-width:140px}
  .unit .u{font:900 11px 'Nunito',sans-serif;letter-spacing:1px;color:#b5654a}
  .unit .n{font-size:20px;font-weight:600}
  .unit .acts{display:flex;gap:8px;flex-wrap:wrap}
  .act{font:800 13px 'Nunito',sans-serif;padding:9px 14px;border-radius:999px;color:#fff;white-space:nowrap}
  .a-tr{background:#7c2340}.a-gm{background:#e0952a}.a-ws{background:#3f7a20}
  .foot{text-align:center;font:700 13px 'Nunito',sans-serif;color:#8a7a68;margin-top:34px}
</style>
</head>
<body>
  <a class="home" href="course.html">← Домой</a>
  <div class="wrap">
    <div class="head">
      <h1 id="title">Юниты</h1>
      <div class="sub" id="sub">выбери юнит и занятие</div>
    </div>
    <div class="list" id="list"></div>
    <div class="foot">Made for @english.with_asya · англ + рус · для детей 6–8</div>
  </div>

  <script src="words.js"></script>
  <script>
    document.getElementById("title").textContent = SM_COURSE.emoji + " " + SM_COURSE.title;
    document.getElementById("sub").textContent = "Юниты · выбери занятие";
    function esc(s){return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
    const list=document.getElementById("list");
    SM_UNITS.forEach(u=>{
      const el=document.createElement("div");el.className="unit";
      el.innerHTML=
        '<div class="ue" style="background:'+(u.color||"#f6e2cf")+'">'+u.emoji+'</div>'+
        '<div class="info"><div class="u">'+esc(u.unit)+'</div><div class="n">'+esc(u.title)+'</div></div>'+
        '<div class="acts">'+
          '<a class="act a-tr" href="trainer.html?unit='+u.id+'">🎯 Тренажёр</a>'+
          '<a class="act a-gm" href="games.html?u='+u.id+'">🎮 Игры</a>'+
          '<a class="act a-ws" href="worksheet.html?u='+u.id+'" target="_blank">✏️ Лист</a>'+
        '</div>';
      list.appendChild(el);
    });
  </script>
</body>
</html>
