<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Minds 1 · Тренажёр слов</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#f4e9d8;font-family:'Fredoka',sans-serif;color:#1c1310;min-height:100vh}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none}
  .home{position:fixed;top:12px;left:12px;z-index:9;background:#7c2340;color:#fff;padding:9px 16px;border-radius:999px;font:800 14px 'Nunito',sans-serif;box-shadow:0 4px 0 #e3d3ba}
  .cab{position:fixed;top:12px;right:12px;z-index:9;background:#fff;color:#7c2340;padding:9px 16px;border-radius:999px;font:800 14px 'Nunito',sans-serif;box-shadow:0 4px 0 #e3d3ba}
  .wrap{max-width:720px;margin:0 auto;padding:64px 18px 56px}
  h1{margin:0;text-align:center;font-size:clamp(28px,6vw,44px);font-weight:700;color:#7c2340;letter-spacing:-1px}
  .sub{text-align:center;margin:8px 0 18px;font:800 14px 'Nunito',sans-serif;color:#5a4f47}
  .banner{background:#fff4e0;border:2px solid #f0c96b;border-radius:16px;padding:11px 15px;font:700 13px 'Nunito',sans-serif;color:#7a5b12;text-align:center;margin-bottom:16px}
  .banner a{color:#7c2340;font-weight:900;text-decoration:underline}
  .label{font:800 11px 'Nunito',sans-serif;color:#8a7a68;letter-spacing:.5px;margin:0 2px 8px}

  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
  .chip{background:#fff;border:2px solid #e3d3ba;border-radius:999px;padding:6px 12px;font:800 12.5px 'Nunito',sans-serif;color:#5a4f47}
  .chip.on{background:#7c2340;border-color:#7c2340;color:#fff}

  .modes{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  .mode{background:#fff;border:2px solid #e3d3ba;border-radius:14px;padding:9px 13px;font:800 13.5px 'Nunito',sans-serif;color:#5a4f47}
  .mode.on{background:#7c2340;border-color:#7c2340;color:#fff}
  .mode.mix.on{background:#e0952a;border-color:#e0952a}
  .mode.mix{color:#b06a12;border-color:#f0c96b}

  .stats{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .stat{background:#fff;border-radius:12px;padding:7px 12px;font:800 13px 'Nunito',sans-serif;box-shadow:0 4px 0 #e3d3ba;white-space:nowrap}
  .bar{flex:1;height:14px;background:#e9dcc6;border-radius:999px;overflow:hidden}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,#8bc34a,#7cb342);width:0;transition:width .35s}

  .card{background:#fff;border-radius:26px;box-shadow:0 8px 0 #e3d3ba;padding:30px 22px;text-align:center;min-height:250px;display:flex;flex-direction:column;justify-content:center;align-items:center;animation:pop .25s ease}
  @keyframes pop{from{transform:scale(.97);opacity:.4}to{transform:scale(1);opacity:1}}
  .emoji{font-size:76px;line-height:1;margin-bottom:10px}
  .word{font-size:38px;font-weight:700;color:#7c2340}
  .ru{font-size:26px;font-weight:600;color:#1c1310}
  .prompt{font:800 13px 'Nunito',sans-serif;color:#a99a86;margin-top:12px}
  .speak{margin-top:12px;background:#f6e2cf;border-radius:999px;padding:9px 20px;font:800 14px 'Nunito',sans-serif;color:#7c2340}
  .bigspeak{width:120px;height:120px;border-radius:50%;background:#f6e2cf;font-size:56px;display:flex;align-items:center;justify-content:center;margin:6px auto 4px;box-shadow:0 6px 0 #e3d3ba}

  .fc-btns{display:flex;gap:12px;margin-top:16px}
  .fc-btns button{flex:1;border-radius:16px;padding:15px;font:800 16px 'Nunito',sans-serif;box-shadow:0 5px 0 rgba(0,0,0,.08)}
  .no{background:#fbe0d8;color:#a23b1e}
  .yes{background:#dff0d2;color:#3f7a20}

  .opts{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:16px}
  .opt{background:#fff;border:2px solid #e3d3ba;border-radius:18px;padding:16px;font-size:20px;font-weight:600;color:#1c1310;transition:transform .1s}
  .opt:active{transform:scale(.97)}
  .opt .oem{font-size:30px;display:block;margin-bottom:4px}
  .opt.correct{background:#dff0d2;border-color:#7cb342;color:#3f7a20}
  .opt.wrong{background:#fbe0d8;border-color:#e07a5f;color:#a23b1e}

  .field{display:flex;gap:8px;margin-top:16px}
  .field input{flex:1;border:2px solid #e3d3ba;border-radius:16px;padding:15px 16px;font:700 22px 'Fredoka',sans-serif;text-align:center;background:#fdfbf7;color:#1c1310}
  .field input:focus{outline:none;border-color:#7c2340}
  .check{background:#7c2340;color:#fff;border-radius:16px;padding:0 22px;font:800 16px 'Nunito',sans-serif}

  .built{min-height:46px;font-size:30px;font-weight:700;color:#7c2340;letter-spacing:3px;margin-top:14px;border-bottom:3px dashed #e3d3ba;display:inline-flex;gap:2px;justify-content:center;min-width:120px;padding:4px 8px}
  .letters{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:16px}
  .letter{background:#fff;border:2px solid #e3d3ba;border-radius:12px;width:46px;height:52px;font-size:24px;font-weight:700;color:#7c2340;display:flex;align-items:center;justify-content:center}
  .letter.used{opacity:.25;pointer-events:none}
  .tinybtn{margin-top:12px;background:#f4e9d8;border-radius:999px;padding:8px 16px;font:800 13px 'Nunito',sans-serif;color:#7c2340}

  .pairs{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;margin-top:8px}
  .pcard{background:#fff;border:2px solid #e3d3ba;border-radius:16px;padding:14px 10px;font-size:17px;font-weight:600;text-align:center;min-height:52px;display:flex;align-items:center;justify-content:center}
  .pcard.sel{border-color:#7c2340;background:#fbeef1}
  .pcard.done{opacity:0;pointer-events:none;transition:opacity .35s}
  .pcard .pem{font-size:22px;margin-right:6px}

  .next{margin-top:14px;width:100%;background:#7c2340;color:#fff;border-radius:16px;padding:14px;font:800 16px 'Nunito',sans-serif;display:none}

  .done-box{background:#fff;border-radius:26px;box-shadow:0 8px 0 #e3d3ba;padding:34px 22px;text-align:center}
  .done-box .big{font-size:60px}
  .done-box h2{margin:8px 0 4px;color:#7c2340}
  .done-box .again{margin-top:16px;background:#7c2340;color:#fff;border-radius:16px;padding:14px 24px;font:800 16px 'Nunito',sans-serif}
  .foot{text-align:center;font:700 13px 'Nunito',sans-serif;color:#8a7a68;margin-top:30px}

  /* бейдж-тост */
  .badgeToast{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(28,19,16,.45);z-index:50;opacity:0;pointer-events:none;transition:opacity .25s}
  .badgeToast.show{opacity:1;pointer-events:auto}
  .badgeCard{background:#fff;border-radius:28px;padding:32px 30px;text-align:center;box-shadow:0 16px 40px rgba(0,0,0,.3);animation:pop .3s ease;max-width:320px}
  .badgeCard .medal{width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 50% 35%,#ffe08a,#f4b93c);display:flex;align-items:center;justify-content:center;font-size:60px;margin:0 auto 14px;box-shadow:0 6px 0 #d99a1e}
  .badgeCard h3{margin:0 0 4px;color:#7c2340;font-size:22px}
  .badgeCard p{margin:0;font:800 14px 'Nunito',sans-serif;color:#5a4f47}
  .badgeCard .ok{margin-top:16px;background:#7c2340;color:#fff;border-radius:14px;padding:11px 26px;font:800 15px 'Nunito',sans-serif}
</style>
</head>
<body>
  <a class="home" href="course.html">← Домой</a>
  <a class="cab" href="cabinet.html">👤 Кабинет</a>
  <div class="wrap">
    <h1>🎯 Тренажёр слов</h1>
    <div class="sub" id="greet">Super Minds 1 · учи слова всех юнитов</div>

    <div id="banner" class="banner" style="display:none"></div>

    <div class="label">ВЫБЕРИ ЮНИТЫ</div>
    <div class="chips" id="chips"></div>

    <div class="label">РЕЖИМ</div>
    <div class="modes" id="modes"></div>

    <div class="stats">
      <div class="stat" id="stPts">⭐ 0</div>
      <div class="stat" id="stDays">🔥 0 дн.</div>
      <div class="bar"><i id="barFill"></i></div>
      <div class="stat" id="stProg">0/0</div>
    </div>

    <div id="stage"></div>

    <div class="foot">Made for @english.with_asya · англ + рус · для детей 6–8</div>
  </div>

  <div class="badgeToast" id="badgeToast">
    <div class="badgeCard">
      <div class="medal" id="badgeMedal">🏅</div>
      <h3 id="badgeTitle">Бейдж получен!</h3>
      <p id="badgeText"></p>
      <button class="ok" id="badgeOk">Ура! 🎉</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="words.js"></script>
  <script src="sm-auth.js"></script>
  <script>
    const TARGET = 4;
    const MODES = [
      { id: "mix",     label: "⚡ Микс",     cls: "mix" },
      { id: "flash",   label: "🃏 Карточки" },
      { id: "listen",  label: "🎧 Аудио" },
      { id: "chooseEn",label: "🔤 Выбор слова" },
      { id: "chooseRu",label: "🌍 Перевод" },
      { id: "type",    label: "⌨️ Впиши" },
      { id: "assemble",label: "🧩 Собери" },
      { id: "pairs",   label: "🔗 Найди пару" }
    ];

    let selectedUnits = SM_UNITS.map(u => u.id);
    let mode = "mix";
    let progress = {};   // { id:{level,correct,seen,status}, __meta:{...} }
    let meta = { totalPoints:0, dayStreak:0, bestStreak:0, lastActive:null, badges:[] };
    let points = 0, streak = 0;
    let prevId = null, busy = false, saveTimer = null;

    function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
    function pool(){ return SM_ALL_WORDS.filter(w => selectedUnits.includes(w.unitId)); }
    function lvl(id){ return (progress[id] && progress[id].level) || 0; }
    function esc(s){return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
    function speak(t){ try{const u=new SpeechSynthesisUtterance(t);u.lang="en-US";u.rate=.9;speechSynthesis.cancel();speechSynthesis.speak(u);}catch(e){} }

    let actx=null;
    function beep(ok){ try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)();
      const seq=ok?[[660,0],[880,.12]]:[[200,0]];
      seq.forEach(([f,t])=>{const o=actx.createOscillator(),g=actx.createGain();o.frequency.value=f;o.type="sine";o.connect(g);g.connect(actx.destination);
        const s=actx.currentTime+t;g.gain.setValueAtTime(.0001,s);g.gain.exponentialRampToValueAtTime(.2,s+.02);g.gain.exponentialRampToValueAtTime(.0001,s+.18);o.start(s);o.stop(s+.2);});}catch(e){} }

    /* ---- дата / дневной streak / неделя ---- */
    function dstr(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
    function weekKey(dt){ const d=new Date(Date.UTC(dt.getFullYear(),dt.getMonth(),dt.getDate()));
      const day=(d.getUTCDay()+6)%7; d.setUTCDate(d.getUTCDate()-day+3);
      const firstThu=new Date(Date.UTC(d.getUTCFullYear(),0,4));
      const week=1+Math.round(((d-firstThu)/86400000 - 3 + ((firstThu.getUTCDay()+6)%7))/7);
      return d.getUTCFullYear()+"-"+String(week).padStart(2,"0"); }
    function playFanfare(){ try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)();
      const notes=[[523.25,0],[659.25,.12],[783.99,.24],[1046.5,.40]];
      notes.forEach(([f,t])=>{const o=actx.createOscillator(),g=actx.createGain();o.type="triangle";o.frequency.value=f;o.connect(g);g.connect(actx.destination);
        const s=actx.currentTime+t;g.gain.setValueAtTime(.0001,s);g.gain.exponentialRampToValueAtTime(.28,s+.03);g.gain.exponentialRampToValueAtTime(.0001,s+.45);o.start(s);o.stop(s+.47);});}catch(e){} }
    function touchDay(){
      meta = progress.__meta || { totalPoints:0, dayStreak:0, bestStreak:0, lastActive:null, badges:[] };
      if(!meta.badges) meta.badges = [];
      const t = dstr(new Date());
      if(meta.lastActive !== t){
        const y = new Date(); y.setDate(y.getDate()-1);
        meta.dayStreak = (meta.lastActive === dstr(y)) ? (meta.dayStreak||0)+1 : 1;
        meta.lastActive = t;
        if((meta.dayStreak||0) > (meta.bestStreak||0)) meta.bestStreak = meta.dayStreak;
        progress.__meta = meta; saveSoon();
      }
      points = meta.totalPoints || 0;
    }

    function learnedCount(){ return pool().filter(w => lvl(w.id) >= TARGET).length; }
    function refreshStats(){
      const total=pool().length, done=learnedCount();
      document.getElementById("stProg").textContent = done+"/"+total;
      document.getElementById("barFill").style.width = total?(done/total*100)+"%":"0%";
      document.getElementById("stPts").textContent = "⭐ "+points;
      document.getElementById("stDays").textContent = "🔥 "+(meta.dayStreak||0)+" дн.";
    }
    function saveSoon(){ clearTimeout(saveTimer); saveTimer=setTimeout(()=>SM.saveProgress(progress),600); }

    function record(word, ok){
      const p = progress[word.id] || { level:0, correct:0, seen:0, status:"learning" };
      p.seen++;
      if(ok){ p.correct++; p.level=Math.min(TARGET,p.level+1); } else { p.level=Math.max(0,p.level-1); }
      p.status = p.level>=TARGET ? "learned":"learning";
      p.b = ok ? Math.min((p.b||0)+1,5) : 0;
      p.due = Date.now() + [0,1,2,4,7,15][p.b]*864e5;
      progress[word.id]=p;
      if(ok){ let g=10; streak++; if(streak%5===0) g+=5; points+=g;
        const wk=weekKey(new Date()); if(meta.weekKey!==wk){ meta.weekKey=wk; meta.weekPoints=0; }
        meta.weekPoints=(meta.weekPoints||0)+g;
      } else { streak=0; }
      meta.totalPoints = points; progress.__meta = meta;
      if(ok) checkBadge(word);
      refreshStats(); saveSoon();
    }

    /* ---- бейджи за юниты ---- */
    function unitDone(u){ return u.words.every((w,i)=> (progress[u.id+"-"+i] && progress[u.id+"-"+i].level>=TARGET)); }
    function checkBadge(word){
      const u = SM_UNITS.find(x=>x.id===word.unitId);
      if(!u) return;
      if(unitDone(u) && !meta.badges.includes(u.id)){
        meta.badges.push(u.id); progress.__meta=meta;
        showBadge(u);
      }
    }
    function showBadge(u){
      document.getElementById("badgeMedal").textContent = u.emoji;
      document.getElementById("badgeText").textContent = "Юнит «"+u.title+"» выучен полностью!";
      const t=document.getElementById("badgeToast"); t.classList.add("show");
      playFanfare();
    }
    document.addEventListener("DOMContentLoaded",()=>{});

    function pickWord(){
      const p=pool(); if(!p.length) return null;
      let cand=p.filter(w=>lvl(w.id)<TARGET); if(!cand.length) cand=p;
      let c2=cand.filter(w=>w.id!==prevId); if(c2.length) cand=c2;
      const weighted=[]; cand.forEach(w=>{const rep=(TARGET-lvl(w.id))+1;for(let i=0;i<rep;i++)weighted.push(w);});
      const w=weighted[Math.floor(Math.random()*weighted.length)]; prevId=w.id; return w;
    }
    function distractors(word,n){
      const seen={};seen[(word.en||"").toLowerCase()]=1;const out=[];
      const pool=shuffle(SM_ALL_WORDS.filter(x=>x.unitId===word.unitId)).concat(shuffle(SM_ALL_WORDS));
      for(const x of pool){const k=(x.en||"").toLowerCase();if(seen[k])continue;seen[k]=1;out.push(x);if(out.length>=n)break;}
      return out; }

    function renderChips(){
      const box=document.getElementById("chips"); box.innerHTML="";
      const allOn=selectedUnits.length===SM_UNITS.length;
      const all=document.createElement("button"); all.className="chip"+(allOn?" on":""); all.textContent="Все юниты";
      all.onclick=()=>{selectedUnits=allOn?[]:SM_UNITS.map(u=>u.id);renderChips();nextRound();}; box.appendChild(all);
      SM_UNITS.forEach(u=>{const c=document.createElement("button");c.className="chip"+(selectedUnits.includes(u.id)?" on":"");
        c.textContent=u.emoji+" "+u.title;
        c.onclick=()=>{if(selectedUnits.includes(u.id))selectedUnits=selectedUnits.filter(x=>x!==u.id);else selectedUnits.push(u.id);renderChips();nextRound();};
        box.appendChild(c);});
    }
    function renderModes(){
      const box=document.getElementById("modes"); box.innerHTML="";
      MODES.forEach(m=>{const b=document.createElement("button");b.className="mode "+(m.cls||"")+(mode===m.id?" on":"");b.textContent=m.label;
        b.onclick=()=>{mode=m.id;renderModes();nextRound();};box.appendChild(b);});
    }

    function nextRound(){
      busy=false; refreshStats();
      const stage=document.getElementById("stage");
      if(!pool().length){stage.innerHTML='<div class="card"><div class="prompt">Выбери хотя бы один юнит 👆</div></div>';return;}
      if(mode==="pairs") return renderPairs();
      if(learnedCount()===pool().length && mode!=="flash") return renderDone();
      const w=pickWord(); let t=mode;
      if(mode==="mix"){ let types=["chooseEn","chooseRu","listen","assemble","type"]; if(/[ -]/.test(w.en)) types=["chooseEn","chooseRu","listen","type"]; t=types[Math.floor(Math.random()*types.length)]; }
      if(t==="assemble"&&/[ -]/.test(w.en)) t="chooseEn";
      if(t==="flash")renderFlash(w); else if(t==="listen")renderListen(w);
      else if(t==="chooseEn")renderChoose(w,"toEn"); else if(t==="chooseRu")renderChoose(w,"toRu");
      else if(t==="type")renderType(w); else if(t==="assemble")renderAssemble(w);
    }
    function autoNext(ms){ setTimeout(()=>{ if(mode!=="flash") nextRound(); }, ms||1100); }

    function renderFlash(w){
      const stage=document.getElementById("stage");
      stage.innerHTML='<div class="card" id="fc"><div class="emoji">'+SM_face(w,92)+'</div><div class="word">'+esc(w.en)+'</div>'+
        '<button class="speak" id="spk">🔊 послушать</button><div class="ru" id="ru" style="display:none;margin-top:8px">'+esc(w.ru)+'</div>'+
        '<div class="prompt" id="ph">нажми на карточку, чтобы увидеть перевод</div></div>'+
        '<div class="fc-btns" id="fb" style="display:none"><button class="no" id="bno">❌ Ещё учу</button><button class="yes" id="byes">✅ Знаю</button></div>';
      speak(w.en); let flipped=false;
      document.getElementById("spk").onclick=e=>{e.stopPropagation();speak(w.en);};
      document.getElementById("fc").onclick=()=>{if(flipped)return;flipped=true;document.getElementById("ru").style.display="block";document.getElementById("ph").style.display="none";document.getElementById("fb").style.display="flex";};
      document.getElementById("bno").onclick=()=>{record(w,false);nextRound();};
      document.getElementById("byes").onclick=()=>{record(w,true);beep(true);nextRound();};
    }
    function renderChoose(w,dir){
      const stage=document.getElementById("stage"); const opts=shuffle([w,...distractors(w,3)]);
      const head=dir==="toEn"?'<div class="emoji">'+SM_face(w,92)+'</div><div class="ru">'+esc(w.ru)+'</div><div class="prompt">выбери английское слово</div>'
        :'<div class="emoji">'+SM_face(w,92)+'</div><div class="word">'+esc(w.en)+'</div><button class="speak" id="spk">🔊</button><div class="prompt">выбери перевод</div>';
      stage.innerHTML='<div class="card">'+head+'</div><div class="opts" id="opts"></div>';
      if(dir==="toRu"){speak(w.en);const s=document.getElementById("spk");if(s)s.onclick=()=>speak(w.en);}
      const box=document.getElementById("opts");
      opts.forEach(o=>{const b=document.createElement("button");b.className="opt";b.textContent=dir==="toEn"?o.en:o.ru;
        b.onclick=()=>{if(busy)return;busy=true;const ok=o.id===w.id;const cb=[...box.children].find(c=>c.textContent===(dir==="toEn"?w.en:w.ru));
          if(ok)b.classList.add("correct");else{b.classList.add("wrong");if(cb)cb.classList.add("correct");}
          beep(ok);if(dir==="toEn")speak(w.en);record(w,ok);autoNext(ok?900:1500);};box.appendChild(b);});
    }
    function renderListen(w){
      const stage=document.getElementById("stage"); const opts=shuffle([w,...distractors(w,3)]);
      stage.innerHTML='<div class="card"><button class="bigspeak" id="big">🔊</button><div class="prompt">послушай и выбери картинку</div></div><div class="opts" id="opts"></div>';
      speak(w.en); document.getElementById("big").onclick=()=>speak(w.en);
      const box=document.getElementById("opts");
      opts.forEach(o=>{const b=document.createElement("button");b.className="opt";b.innerHTML='<span class="oem">'+SM_face(o,40)+'</span>'+esc(o.en);
        b.onclick=()=>{if(busy)return;busy=true;const ok=o.id===w.id;const cb=[...box.children].find(c=>c.textContent.includes(w.en));
          if(ok)b.classList.add("correct");else{b.classList.add("wrong");if(cb)cb.classList.add("correct");}
          beep(ok);speak(w.en);record(w,ok);autoNext(ok?900:1500);};box.appendChild(b);});
    }
    function renderType(w){
      const stage=document.getElementById("stage");
      stage.innerHTML='<div class="card"><div class="emoji">'+SM_face(w,92)+'</div><div class="ru">'+esc(w.ru)+'</div><button class="speak" id="spk">🔊 послушать</button><div class="prompt">напиши слово по-английски</div></div>'+
        '<div class="field"><input id="inp" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="type here…"><button class="check" id="chk">OK</button></div><button class="next" id="next">дальше →</button>';
      speak(w.en); document.getElementById("spk").onclick=()=>speak(w.en);
      const inp=document.getElementById("inp"); inp.focus();
      function submit(){ if(busy)return;busy=true;const val=inp.value.trim().toLowerCase();const ok=val===w.en.toLowerCase();
        inp.style.borderColor=ok?"#7cb342":"#e07a5f";inp.style.background=ok?"#dff0d2":"#fbe0d8";if(!ok)inp.value=w.en;
        beep(ok);speak(w.en);record(w,ok);const n=document.getElementById("next");n.style.display="block";n.onclick=nextRound;}
      document.getElementById("chk").onclick=submit; inp.addEventListener("keydown",e=>{if(e.key==="Enter")submit();});
    }
    function renderAssemble(w){
      const stage=document.getElementById("stage");const target=w.en;const letters=shuffle(target.split(""));
      stage.innerHTML='<div class="card"><div class="emoji">'+SM_face(w,92)+'</div><div class="ru">'+esc(w.ru)+'</div><div class="built" id="built"></div><div class="letters" id="lets"></div><button class="tinybtn" id="clr">⌫ стереть</button></div><button class="next" id="next">дальше →</button>';
      const builtEl=document.getElementById("built"),lets=document.getElementById("lets");let built=[];
      letters.forEach((ch,i)=>{const b=document.createElement("button");b.className="letter";b.textContent=ch;
        b.onclick=()=>{if(busy||b.classList.contains("used"))return;b.classList.add("used");built.push({ch,el:b});draw();};lets.appendChild(b);});
      document.getElementById("clr").onclick=()=>{if(busy)return;const last=built.pop();if(last)last.el.classList.remove("used");draw();};
      function draw(){ builtEl.textContent=built.map(x=>x.ch).join("");
        if(built.length===target.length){busy=true;const ok=built.map(x=>x.ch).join("")===target;builtEl.style.color=ok?"#3f7a20":"#a23b1e";if(!ok)builtEl.textContent=target;
          beep(ok);speak(target);record(w,ok);const n=document.getElementById("next");n.style.display="block";n.onclick=nextRound;} }
    }
    function renderPairs(){
      const stage=document.getElementById("stage");const p=pool();const batch=shuffle(p).slice(0,Math.min(6,p.length));
      const left=shuffle(batch.map(w=>({w,side:"en"})));const right=shuffle(batch.map(w=>({w,side:"ru"})));const rows=Math.max(left.length,right.length);
      let html='<div class="pairs" id="pairs">';
      for(let i=0;i<rows;i++){const l=left[i],r=right[i];
        html+=l?'<button class="pcard" data-id="'+l.w.id+'" data-side="en"><span class="pem">'+SM_face(l.w,34)+'</span>'+esc(l.w.en)+'</button>':'<div></div>';
        html+=r?'<button class="pcard" data-id="'+r.w.id+'" data-side="ru">'+esc(r.w.ru)+'</button>':'<div></div>';}
      html+='</div>';
      stage.innerHTML='<div class="prompt" style="text-align:center;margin-bottom:8px">Соедини слово и перевод</div>'+html;
      let sel=null,left_count=batch.length;
      document.querySelectorAll("#pairs .pcard").forEach(c=>{c.onclick=()=>{
        if(c.classList.contains("done"))return;
        if(!sel){sel=c;c.classList.add("sel");if(c.dataset.side==="en"){const en=SM_ALL_WORDS.find(x=>x.id===c.dataset.id);if(en)speak(en.en);}return;}
        if(sel===c){c.classList.remove("sel");sel=null;return;}
        if(sel.dataset.side===c.dataset.side){sel.classList.remove("sel");sel=c;c.classList.add("sel");return;}
        const w=SM_ALL_WORDS.find(x=>x.id===c.dataset.id);
        if(sel.dataset.id===c.dataset.id){beep(true);const en=SM_ALL_WORDS.find(x=>x.id===c.dataset.id);if(en)speak(en.en);
          sel.classList.add("done");c.classList.add("done");sel.classList.remove("sel");record(w,true);sel=null;left_count--;
          if(left_count===0)setTimeout(renderPairs,500);}
        else{beep(false);const s=sel;s.classList.add("wrong");c.classList.add("wrong");const ww=SM_ALL_WORDS.find(x=>x.id===s.dataset.id);if(ww)record(ww,false);
          setTimeout(()=>{s.classList.remove("wrong","sel");c.classList.remove("wrong");},600);sel=null;}
      };});
    }
    function renderDone(){
      const stage=document.getElementById("stage");
      stage.innerHTML='<div class="done-box"><div class="big">🎉</div><h2>Все слова выучены!</h2><div class="prompt">Заработано ⭐ '+points+' очков. Серия: 🔥 '+(meta.dayStreak||0)+' дн.</div><button class="again" id="again">🔁 Повторить</button></div>';
      document.getElementById("again").onclick=()=>{prevId=null;mode="mix";renderModes();nextRound();};
    }

    document.getElementById("badgeOk").onclick=()=>document.getElementById("badgeToast").classList.remove("show");
    document.getElementById("badgeToast").onclick=e=>{ if(e.target.id==="badgeToast") document.getElementById("badgeToast").classList.remove("show"); };

    // предвыбор юнита из ссылки: ?unit=u4  или  ?units=u4,u5
    (function(){
      const q=new URLSearchParams(location.search);
      let ids=[];
      if(q.get("unit")) ids=[q.get("unit")];
      else if(q.get("units")) ids=q.get("units").split(",");
      ids=ids.filter(id=>SM_UNITS.some(u=>u.id===id));
      if(ids.length) selectedUnits=ids;
      const m=q.get("mode");
      if(m && MODES.some(x=>x.id===m)) mode=m;
    })();

    (async function(){
      const user=await SM.getUser();
      if(user)document.getElementById("greet").textContent="Привет, "+user.name+"! Учим слова 💪";
      if(SM.isCloud&&!user){const b=document.getElementById("banner");b.style.display="block";b.innerHTML='Ты не вошёл — прогресс не сохранится. <a href="cabinet.html">Войти в кабинет →</a>';}
      progress=await SM.loadProgress()||{};
      touchDay();
      renderChips();renderModes();nextRound();
    })();
  </script>
</body>
</html>
