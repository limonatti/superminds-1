<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кабинет учителя · English with Asya</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#f4e9d8;font-family:'Fredoka',sans-serif;color:#1c1310;min-height:100vh}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none}
  .home{position:fixed;top:12px;left:12px;z-index:9;background:#7c2340;color:#fff;padding:9px 16px;border-radius:999px;font:800 14px 'Nunito',sans-serif;box-shadow:0 4px 0 #e3d3ba}
  .wrap{max-width:680px;margin:0 auto;padding:64px 20px 56px}
  h1{margin:0;text-align:center;font-size:clamp(28px,6vw,44px);font-weight:700;color:#7c2340;letter-spacing:-1px}
  .sub{text-align:center;margin:10px 0 24px;font:800 15px 'Nunito',sans-serif;color:#5a4f47}
  .panel{background:#fff;border-radius:26px;box-shadow:0 8px 0 #e3d3ba;padding:26px 24px}
  .tabs{display:flex;gap:8px;margin-bottom:18px}
  .tab{flex:1;background:#f4e9d8;border-radius:14px;padding:11px;font:800 14px 'Nunito',sans-serif;color:#5a4f47}
  .tab.on{background:#7c2340;color:#fff}
  label{display:block;font:800 12px 'Nunito',sans-serif;color:#8a7a68;margin:12px 2px 6px;letter-spacing:.5px}
  input{width:100%;border:2px solid #e3d3ba;border-radius:14px;padding:13px 14px;font:600 16px 'Fredoka',sans-serif;color:#1c1310;background:#fdfbf7}
  input:focus{outline:none;border-color:#7c2340}
  .primary{width:100%;margin-top:18px;background:#7c2340;color:#fff;border-radius:16px;padding:15px;font:800 16px 'Nunito',sans-serif;box-shadow:0 5px 0 #5e1a30}
  .msg{margin-top:14px;font:700 13px 'Nunito',sans-serif;text-align:center;min-height:18px}
  .msg.err{color:#a23b1e}.msg.ok{color:#3f7a20}
  .note{font:700 12px 'Nunito',sans-serif;color:#a99a86;text-align:center;margin-top:14px;line-height:1.5}

  .who{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .who .name{font-size:22px;font-weight:700;color:#7c2340}
  .logout{background:#f4e9d8;border-radius:999px;padding:8px 16px;font:800 13px 'Nunito',sans-serif;color:#7c2340}
  .codebox{background:#dfeadd;border-radius:18px;padding:16px;text-align:center;margin-bottom:18px}
  .codebox .lbl{font:800 12px 'Nunito',sans-serif;color:#5a4f47}
  .codebox .code{font-size:34px;font-weight:700;color:#3f7a20;letter-spacing:3px;margin:4px 0}
  .codebox button{margin-top:6px;background:#7c2340;color:#fff;border-radius:999px;padding:9px 18px;font:800 13px 'Nunito',sans-serif}
  .codebox .hint{font:700 12px 'Nunito',sans-serif;color:#5a7a4f;margin-top:8px}

  .sec-title{font:900 12px 'Nunito',sans-serif;color:#8a7a68;letter-spacing:.6px;margin:6px 2px 10px;display:flex;justify-content:space-between;align-items:center}
  .sec-title button{background:#f4e9d8;border-radius:999px;padding:6px 12px;font:800 12px 'Nunito',sans-serif;color:#7c2340}
  .srow{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:14px;background:#faf4ea;margin-bottom:8px;flex-wrap:wrap}
  .srow .av{width:38px;height:38px;border-radius:50%;background:#f6e2cf;display:flex;align-items:center;justify-content:center;font-size:20px;flex:none}
  .srow .nm{font:800 15px 'Nunito',sans-serif;flex:1;min-width:110px}
  .srow .st{font:800 12px 'Nunito',sans-serif;color:#5a4f47;display:flex;gap:10px;flex-wrap:wrap}
  .srow .st b{color:#3f7a20}
  .empty{font:700 13px 'Nunito',sans-serif;color:#a99a86;text-align:center;padding:14px}
  .foot{text-align:center;font:700 13px 'Nunito',sans-serif;color:#8a7a68;margin-top:36px}
</style>
</head>
<body>
  <a class="home" href="index.html">← Учебники</a>
  <div class="wrap">
    <h1>👩‍🏫 Кабинет учителя</h1>
    <div class="sub" id="sub">вход и твой класс</div>
    <div id="root"></div>
    <div class="foot">Made for @english.with_asya</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="words.js"></script>
  <script src="sm-auth.js"></script>
  <script>
    let authTab="in";
    function esc(s){return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
    function ago(ts){ if(!ts)return "—"; const d=(Date.now()-new Date(ts).getTime())/86400000;
      if(d<1)return "сегодня"; if(d<2)return "вчера"; return Math.floor(d)+" дн. назад"; }
    function learned(data){ let n=0; for(const k in data){ if(k==="__meta")continue; if(data[k]&&data[k].status==="learned")n++; } return n; }

    function renderAuth(){
      if(!SM.isCloud){
        document.getElementById("sub").textContent="нужен Supabase";
        document.getElementById("root").innerHTML='<div class="panel"><div class="note">Кабинет учителя работает только с настоящими аккаунтами (Supabase). Он уже подключён — если видишь это сообщение, обнови страницу.</div></div>';
        return;
      }
      document.getElementById("sub").textContent="войди как учитель";
      document.getElementById("root").innerHTML=
        '<div class="panel">'+
          '<div class="tabs"><button class="tab '+(authTab==="in"?"on":"")+'" onclick="setTab(\'in\')">Вход</button><button class="tab '+(authTab==="up"?"on":"")+'" onclick="setTab(\'up\')">Регистрация</button></div>'+
          (authTab==="up"?'<label>ИМЯ</label><input id="fName" placeholder="Ася">':'')+
          '<label>EMAIL</label><input id="fEmail" type="email" placeholder="mail@example.com">'+
          '<label>ПАРОЛЬ</label><input id="fPass" type="password" placeholder="минимум 6 символов">'+
          '<button class="primary" id="go">'+(authTab==="in"?"Войти":"Создать аккаунт учителя")+'</button>'+
          '<div class="msg" id="msg"></div>'+
        '</div>';
      document.getElementById("go").onclick=submit;
    }
    function setTab(t){authTab=t;renderAuth();}
    async function submit(){
      const msg=document.getElementById("msg");msg.className="msg";msg.textContent="…";
      const name=(document.getElementById("fName")||{}).value||"";
      const email=(document.getElementById("fEmail")||{}).value||"";
      const pass=(document.getElementById("fPass")||{}).value||"";
      let res;
      if(authTab==="up")res=await SM.signUp(name,email,pass); else res=await SM.signIn(email,pass);
      if(!res.ok){msg.className="msg err";msg.textContent=res.error||"Ошибка";return;}
      if(res.needConfirm){msg.className="msg ok";msg.textContent="Аккаунт создан! Подтверди email и войди.";return;}
      route();
    }

    async function renderDash(user){
      document.getElementById("sub").textContent="твой класс и прогресс учеников";
      const root=document.getElementById("root");
      root.innerHTML='<div class="panel"><div class="who"><div class="name">'+esc(user.name)+'</div><button class="logout" id="out">Выйти</button></div><div id="body"><div class="empty">Загрузка…</div></div></div>';
      document.getElementById("out").onclick=async()=>{await SM.signOut();route();};

      const codeRes=await SM.ensureTeacherCode(user.name);
      const code=codeRes.code||"—";
      const students=await SM.myStudents();

      const rows = students.length ? students.map(s=>{
        const data=s.data||{}; const meta=data.__meta||{};
        return '<div class="srow"><div class="av">🧒</div><div class="nm">'+esc(s.name)+'</div>'+
          '<div class="st"><span>✅ <b>'+learned(data)+'</b> слов</span><span>⭐ '+(meta.totalPoints||0)+'</span><span>🔥 '+(meta.dayStreak||0)+' дн.</span><span>🕘 '+ago(s.updated_at)+'</span></div></div>';
      }).join("") : '<div class="empty">Пока нет учеников. Дай им код класса — и они появятся здесь.</div>';

      document.getElementById("body").innerHTML=
        '<div class="codebox"><div class="lbl">КОД КЛАССА</div><div class="code">'+esc(code)+'</div>'+
          '<button id="copy">🔗 Скопировать приглашение</button>'+
          ' <a href="room.html" style="display:inline-block;margin-top:6px;background:#3f7a20;color:#fff;border-radius:999px;padding:9px 18px;font:800 13px \'Nunito\',sans-serif;text-decoration:none">🧑‍🏫 Комната урока</a>'+
          '<div class="hint">Ученик заходит в «Кабинет ученика» и вводит этот код</div></div>'+
        '<div class="sec-title">МОИ УЧЕНИКИ · '+students.length+'<button id="refresh">↻ Обновить</button></div>'+
        rows;

      document.getElementById("refresh").onclick=()=>renderDash(user);
      document.getElementById("copy").onclick=()=>{
        const txt="Заходи ко мне на English with Asya! Открой «Кабинет ученика» и введи код класса: "+code+"\n"+location.origin+location.pathname.replace(/teacher\.html$/,"cabinet.html");
        if(navigator.clipboard)navigator.clipboard.writeText(txt).then(()=>alert("Приглашение скопировано!\n\n"+txt),()=>prompt("Скопируй:",txt));
        else prompt("Скопируй:",txt);
      };
    }

    async function route(){ const user=await SM.getUser(); if(user)renderDash(user); else renderAuth(); }
    route();
  </script>
</body>
</html>
