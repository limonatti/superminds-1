<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Конструктор упражнений · English with Asya</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#f4e9d8;font-family:'Fredoka',sans-serif;color:#1c1310;min-height:100vh}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none}
  .home{position:fixed;top:12px;left:12px;z-index:9;background:#7c2340;color:#fff;padding:9px 16px;border-radius:999px;font:800 14px 'Nunito',sans-serif;box-shadow:0 4px 0 #e3d3ba}
  .wrap{max-width:680px;margin:0 auto;padding:64px 20px 60px}
  h1{margin:0;text-align:center;font-size:clamp(26px,6vw,40px);font-weight:700;color:#7c2340;letter-spacing:-1px}
  .sub{text-align:center;margin:8px 0 22px;font:800 14px 'Nunito',sans-serif;color:#5a4f47}
  .panel{background:#fff;border-radius:22px;box-shadow:0 8px 0 #e3d3ba;padding:22px}
  label{display:block;font:800 12px 'Nunito',sans-serif;color:#8a7a68;margin:12px 2px 6px;letter-spacing:.5px}
  input,select,textarea{width:100%;border:2px solid #e3d3ba;border-radius:12px;padding:11px 12px;font:600 15px 'Fredoka',sans-serif;color:#1c1310;background:#fdfbf7}
  input:focus,select:focus,textarea:focus{outline:none;border-color:#7c2340}
  .row2{display:flex;gap:10px}
  .primary{width:100%;margin-top:16px;background:#7c2340;color:#fff;border-radius:14px;padding:14px;font:800 16px 'Nunito',sans-serif;box-shadow:0 5px 0 #5e1a30}
  .msg{margin-top:12px;font:700 13px 'Nunito',sans-serif;text-align:center;min-height:16px}
  .msg.err{color:#a23b1e}.msg.ok{color:#3f7a20}
  .optrow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .optrow input[type=text]{flex:1}
  .optrow .rm{background:#fbe0d8;color:#a23b1e;border-radius:10px;padding:8px 11px;font:800 13px 'Nunito',sans-serif;flex:none}
  .add{background:#eef4ea;color:#3f7a20;border-radius:999px;padding:8px 14px;font:800 13px 'Nunito',sans-serif;margin-top:4px}
  .imgrow{display:flex;gap:8px}
  .imgrow .img{flex:1}
  .upl{background:#eef4ea;color:#3f7a20;border-radius:12px;padding:0 14px;font:800 13px 'Nunito',sans-serif;flex:none;white-space:nowrap}
  .imgprev img{max-width:130px;border-radius:10px;margin-top:8px;border:2px solid #e3d3ba}
  .addbig{display:block;width:100%;margin-top:6px;background:#3f7a20;color:#fff;border-radius:12px;padding:11px;font:800 14px 'Nunito',sans-serif;box-shadow:0 4px 0 #2c5716}
  .corr{display:flex;align-items:center;gap:4px;font:800 11px 'Nunito',sans-serif;color:#3f7a20;flex:none}
  .qblock{border:2px solid #e3d3ba;border-radius:14px;padding:12px 12px 14px;margin-bottom:12px;background:#fdfbf7}
  .qblock .bh{display:flex;justify-content:space-between;align-items:center}
  .qblock .bh .n{font:900 11px 'Nunito',sans-serif;color:#b5654a;letter-spacing:.6px}
  .qblock .bh .rmq{background:#fbe0d8;color:#a23b1e;border-radius:999px;padding:5px 11px;font:800 12px 'Nunito',sans-serif}
  .qblock label:first-child{margin-top:4px}
  .hinttext{font:700 12px 'Nunito',sans-serif;color:#a99a86;margin-top:6px}
  .sec-title{font:900 12px 'Nunito',sans-serif;color:#8a7a68;letter-spacing:.6px;margin:26px 2px 12px}
  .exrow{display:flex;align-items:center;gap:10px;background:#faf4ea;border-radius:12px;padding:10px 12px;margin-bottom:8px;flex-wrap:wrap}
  .exrow .t{flex:1;font:800 13.5px 'Nunito',sans-serif;min-width:130px}
  .exrow .badge{background:#f0c96b;color:#7a5b12;border-radius:999px;padding:3px 8px;font:900 10px 'Nunito',sans-serif}
  .exrow .cnt{background:#dbe8f5;color:#2a5f8f;border-radius:999px;padding:3px 8px;font:900 10px 'Nunito',sans-serif}
  .exrow .ed{background:#7c2340;color:#fff;border-radius:999px;padding:6px 12px;font:800 12px 'Nunito',sans-serif}
  .exrow .de{background:#fbe0d8;color:#a23b1e;border-radius:999px;padding:6px 10px;font:800 12px 'Nunito',sans-serif}
  .empty{font:700 13px 'Nunito',sans-serif;color:#a99a86;text-align:center;padding:12px}
  .foot{text-align:center;font:700 13px 'Nunito',sans-serif;color:#8a7a68;margin-top:30px}
</style>
</head>
<body>
  <a class="home" href="teacher.html">← Кабинет</a>
  <div class="wrap">
    <h1>🛠 Конструктор упражнений</h1>
    <div class="sub" id="sub">создавай свои упражнения — как на edvibe</div>
    <div id="root"></div>
    <div class="foot">Made for @english.with_asya</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="words.js"></script>
  <script src="sm-auth.js"></script>
  <script>
    function esc(s){return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
    const TYPES={
      choice:{label:"✅ Выбор ответа"},
      gap:{label:"✍️ Впиши слово"},
      match:{label:"🔗 Найди пару"},
      order:{label:"🔀 Порядок слов"},
      tf:{label:"🟢 Верно / Неверно"},
      listen:{label:"🎧 Аудирование"},
      multi:{label:"☑️ Несколько ответов"},
      categorize:{label:"🗂 Категории"},
      cloze:{label:"🔽 Пропуски-выбор"},
      letters:{label:"🔡 Собери слово"},
      fillbox:{label:"📦 Впиши из банка слов"},
      text:{label:"📖 Текст / статья"},
      image:{label:"🖼 Картинка"},
      video:{label:"🎬 Видео (YouTube)"},
      embed:{label:"🌐 Интерактив по ссылке (Wordwall, LearningApps…)"},
      audio:{label:"🔊 Аудио (озвучка)"},
      dialogue:{label:"💬 Диалог"},
      note:{label:"🗒 Заметка / правило"},
      open:{label:"📝 Открытый вопрос"}
    };
    // типы, где в одном упражнении можно добавлять несколько заданий-вопросов
    const QREPEAT=new Set(["choice","gap","order","tf","listen","multi","cloze","letters","open"]);
    let editId=null;

    /* ---- загрузка картинки с компьютера (сжатие в браузере, без сервера) ---- */
    function pickImage(input,cb){
      const fi=document.createElement("input");fi.type="file";fi.accept="image/*";
      fi.onchange=()=>{const file=fi.files&&fi.files[0];if(!file)return;
        const rd=new FileReader();
        rd.onload=()=>{const img=new Image();
          img.onload=()=>{const max=800;let w=img.width,h=img.height;
            if(w>max||h>max){const s=Math.min(max/w,max/h);w=Math.round(w*s);h=Math.round(h*s);}
            const cv=document.createElement("canvas");cv.width=w;cv.height=h;cv.getContext("2d").drawImage(img,0,0,w,h);
            input.value=cv.toDataURL("image/jpeg",0.82);if(cb)cb();};
          img.onerror=()=>{input.value=rd.result;if(cb)cb();};
          img.src=rd.result;};
        rd.readAsDataURL(file);};
      fi.click();
    }
    function wireImageIn(scope){
      const inp=scope.querySelector(".img");if(!inp)return;
      const btn=scope.querySelector(".upl"),prev=scope.querySelector(".imgprev");
      function showPrev(){ if(prev) prev.innerHTML=inp.value?('<img src="'+inp.value.replace(/"/g,"&quot;")+'" alt="">'):""; }
      if(btn)btn.onclick=()=>pickImage(inp,showPrev);
      inp.addEventListener("input",showPrev);showPrev();
    }
    function imageFieldHTML(val,idAttr){
      return '<label>🖼 КАРТИНКА (необязательно — можно вместо текста)</label>'+
        '<div class="imgrow"><input '+(idAttr?'id="'+idAttr+'" ':'')+'class="img" placeholder="вставь ссылку или загрузи файл →" value="'+esc(val||"")+'"><button class="upl" type="button">📁 файл</button></div>'+
        '<div class="imgprev"></div>';
    }

    /* ---------- ряды для под-элементов (по контейнеру, не по id) ---------- */
    function optRow(box,val,checked,radioName){
      const d=document.createElement("div");d.className="optrow";
      d.innerHTML='<label class="corr"><input type="radio" name="'+radioName+'" style="width:auto"'+(checked?" checked":"")+'>верный</label><input type="text" class="otext" placeholder="вариант" value="'+esc(val)+'"><button class="rm" type="button">✕</button>';
      d.querySelector(".rm").onclick=()=>{ if(box.children.length>2) d.remove(); };
      box.appendChild(d);
    }
    function optRowM(box,val,checked){
      const d=document.createElement("div");d.className="optrow";
      d.innerHTML='<label class="corr"><input type="checkbox" class="ochk" style="width:auto"'+(checked?" checked":"")+'>верный</label><input type="text" class="otext" placeholder="вариант" value="'+esc(val)+'"><button class="rm" type="button">✕</button>';
      d.querySelector(".rm").onclick=()=>{ if(box.children.length>2) d.remove(); };
      box.appendChild(d);
    }
    function pairRow(box,a,b){
      const d=document.createElement("div");d.className="optrow";
      d.innerHTML='<input type="text" class="pa" placeholder="dog" value="'+esc(a)+'"><input type="text" class="pb" placeholder="собака" value="'+esc(b)+'"><button class="rm" type="button">✕</button>';
      d.querySelector(".rm").onclick=()=>{ if(box.children.length>2) d.remove(); };
      box.appendChild(d);
    }
    function catRow(box,name,items){
      const d=document.createElement("div");d.style.cssText="border:2px solid #e3d3ba;border-radius:12px;padding:10px;margin-bottom:8px";
      d.innerHTML='<div style="display:flex;gap:8px;align-items:center"><input class="cname" type="text" placeholder="Название (напр. Животные)" value="'+esc(name)+'"><button class="rm" type="button">✕</button></div>'+
        '<textarea class="citems" rows="3" placeholder="dog\ncat\nbird" style="margin-top:6px">'+esc(items)+'</textarea>';
      d.querySelector(".rm").onclick=()=>{ if(box.children.length>2) d.remove(); };
      box.appendChild(d);
    }
    function lineRow(box,who,text){
      const d=document.createElement("div");d.className="optrow";
      d.innerHTML='<input class="who" type="text" placeholder="A" value="'+esc(who)+'" style="max-width:64px"><input class="dtext" type="text" placeholder="реплика" value="'+esc(text)+'"><button class="rm" type="button">✕</button>';
      d.querySelector(".rm").onclick=()=>{ if(box.children.length>1) d.remove(); };
      box.appendChild(d);
    }

    /* ---------- блок одного вопроса (для многозадачных типов) ---------- */
    function renumber(){ [...document.querySelectorAll("#blocks .qblock .bh .n")].forEach((n,i)=>n.textContent="ЗАДАНИЕ "+(i+1)); }
    function addBlock(type,d){
      d=d||{};
      const blocks=document.getElementById("blocks");
      const uid="r"+Math.random().toString(36).slice(2);
      const b=document.createElement("div");b.className="qblock";b.dataset.type=type;
      b.innerHTML='<div class="bh"><span class="n">ЗАДАНИЕ</span><button class="rmq" type="button">✕ убрать</button></div><div class="bf"></div>';
      b.querySelector(".rmq").onclick=()=>{ if(blocks.children.length>1){b.remove();renumber();} };
      const bf=b.querySelector(".bf");
      if(type==="choice"){
        bf.innerHTML='<label>ВОПРОС</label><input class="q" placeholder="What colour is the sky?" value="'+esc(d.q||"")+'"><label>ВАРИАНТЫ (отметь правильный)</label><div class="opts"></div><button class="add addOpt" type="button">＋ вариант</button>';
        const box=bf.querySelector(".opts");const opts=d.opts||["","",""];const cor=(typeof d.correct==="number")?d.correct:0;
        opts.forEach((o,i)=>optRow(box,o,i===cor,uid));
        bf.querySelector(".addOpt").onclick=()=>optRow(box,"",false,uid);
      } else if(type==="multi"){
        bf.innerHTML='<label>ВОПРОС</label><input class="q" placeholder="Отметь всех животных" value="'+esc(d.q||"")+'"><label>ВАРИАНТЫ (отметь все правильные)</label><div class="opts"></div><button class="add addOpt" type="button">＋ вариант</button>';
        const box=bf.querySelector(".opts");const opts=d.opts||["","",""];const cor=d.correct||[];
        opts.forEach((o,i)=>optRowM(box,o,cor.includes(i)));
        bf.querySelector(".addOpt").onclick=()=>optRowM(box,"",false);
      } else if(type==="gap"){
        bf.innerHTML='<label>ПРЕДЛОЖЕНИЕ (пропуск обозначь ___)</label><input class="q" placeholder="I ___ a cat." value="'+esc(d.q||"")+'"><label>ОТВЕТ (варианты через запятую)</label><input class="answer" placeholder="have, ve" value="'+esc(d.answer||"")+'">';
      } else if(type==="order"){
        bf.innerHTML='<label>ПРАВИЛЬНОЕ ПРЕДЛОЖЕНИЕ (слова через пробел)</label><input class="answer" placeholder="I like cats" value="'+esc(d.answer||"")+'">';
      } else if(type==="tf"){
        bf.innerHTML='<label>УТВЕРЖДЕНИЕ</label><input class="statement" placeholder="A dog is an animal." value="'+esc(d.statement||"")+'"><label>ПРАВИЛЬНЫЙ ОТВЕТ</label><select class="correct"><option value="true"'+(d.correct!==false?" selected":"")+'>Верно</option><option value="false"'+(d.correct===false?" selected":"")+'>Неверно</option></select>';
      } else if(type==="listen"){
        bf.innerHTML='<label>ТЕКСТ ДЛЯ ОЗВУЧКИ (английский)</label><input class="audio" placeholder="It is a red ball" value="'+esc(d.audio||"")+'"><label>ОТВЕТ УЧЕНИКА (варианты через запятую)</label><input class="answer" placeholder="ball, a ball" value="'+esc(d.answer||"")+'">';
      } else if(type==="cloze"){
        bf.innerHTML='<label>ТЕКСТ С ПРОПУСКАМИ</label><textarea class="q" rows="3" placeholder="I [[am|is|are]] happy. She [[likes|like]] cats.">'+esc(d.q||"")+'</textarea><div class="hinttext">Пропуск: [[правильный|неправильный|неправильный]]. Первый вариант — правильный.</div>';
      } else if(type==="letters"){
        bf.innerHTML='<label>СЛОВО ИЛИ ФРАЗА</label><input class="word" placeholder="banana" value="'+esc(d.word||"")+'"><label>ПОДСКАЗКА (перевод, необязательно)</label><input class="hint" placeholder="банан" value="'+esc(d.hint||"")+'">';
      } else if(type==="open"){
        bf.innerHTML='<label>ВОПРОС / ЗАДАНИЕ</label><textarea class="q" rows="2" placeholder="Расскажи о своей семье (2-3 предложения)">'+esc(d.q||"")+'</textarea><label>ОБРАЗЕЦ ОТВЕТА (необязательно)</label><textarea class="model" rows="2" placeholder="This is my mum. Her name is…">'+esc(d.model||"")+'</textarea>';
      }
      bf.insertAdjacentHTML('beforeend',imageFieldHTML(d.img));
      wireImageIn(bf);
      blocks.appendChild(b);
      renumber();
    }

    /* ---------- формы по типам ---------- */
    function renderForm(type,data){
      const f=document.getElementById("fields"); data=data||{};
      if(type==="embed"){
        f.innerHTML='<label>ССЫЛКА — YouTube, Wordwall, LearningApps, LiveWorksheets, Quizlet, Genially, Miro, Google Drive…</label>'+
          '<input id="url" placeholder="https://wordwall.net/resource/…" value="'+esc(data.url||"")+'">'+
          '<label>ВЫСОТА ОКНА, PX (необязательно)</label><input id="h" type="number" placeholder="авто" value="'+(data.h||"")+'">'+
          '<div id="embPrev"></div>';
        const u=document.getElementById("url");
        const prev=()=>{const p=document.getElementById("embPrev");const e=window.SM_embed(u.value);
          if(!u.value.trim()||!e){p.innerHTML="";return;}
          p.innerHTML='<div style="margin-top:10px;font:800 12px \'Nunito\',sans-serif;color:#8a7a68">ПРЕДПРОСМОТР · '+e.name+'</div>'+
            '<iframe src="'+e.src+'" style="width:100%;height:300px;border:2px solid #e3d3ba;border-radius:14px;background:#fff;margin-top:6px" allowfullscreen></iframe>';};
        u.onchange=prev; u.onpaste=()=>setTimeout(prev,50); if(data.url) prev();
        return;
      }
      if(QREPEAT.has(type)){
        f.innerHTML='<div id="blocks"></div><button class="addbig" id="addBlock" type="button">＋ добавить задание</button>';
        let items=[];
        if(data.items&&data.items.length) items=data.items;
        else if(Object.keys(data).length) items=[data];
        else items=[{}];
        items.forEach(it=>addBlock(type,it||{}));
        document.getElementById("addBlock").onclick=()=>addBlock(type,{});
        return;
      }
      if(type==="match"){
        f.innerHTML='<label>ПАРЫ (слово ↔ перевод)</label><div id="pairs"></div><button class="add" id="addPair" type="button">＋ добавить пару</button>';
        const box=document.getElementById("pairs");const pairs=data.pairs||[{a:"",b:""},{a:"",b:""},{a:"",b:""}];
        pairs.forEach(p=>pairRow(box,p.a,p.b));
        document.getElementById("addPair").onclick=()=>pairRow(box,"","");
      } else if(type==="categorize"){
        f.innerHTML='<label>КАТЕГОРИИ (слова — по одному в строке)</label><div id="cats"></div><button class="add" id="addCat" type="button">＋ добавить категорию</button>';
        const box=document.getElementById("cats");const cats=data.cats||[{name:"",items:[]},{name:"",items:[]}];
        cats.forEach(c=>catRow(box,c.name,(c.items||[]).join("\n")));
        document.getElementById("addCat").onclick=()=>catRow(box,"","");
      } else if(type==="dialogue"){
        f.innerHTML='<label>РЕПЛИКИ (кто → что)</label><div id="lines"></div><button class="add" id="addLine" type="button">＋ добавить реплику</button>';
        const box=document.getElementById("lines");const lines=data.lines||[{who:"A",text:""},{who:"B",text:""}];
        lines.forEach(l=>lineRow(box,l.who,l.text));
        document.getElementById("addLine").onclick=()=>lineRow(box,"A","");
      } else if(type==="fillbox"){
        f.innerHTML='<label>ТЕКСТ С ПРОПУСКАМИ ___</label><textarea id="q" rows="3" placeholder="I ___ a cat. She ___ a dog.">'+esc(data.q||"")+'</textarea>'+
          '<label>ПРАВИЛЬНЫЕ СЛОВА (по порядку, через запятую)</label><input id="answers" placeholder="have, has" value="'+esc((data.answers||[]).join(", "))+'">'+
          '<label>ЛИШНИЕ СЛОВА В БАНКЕ (через запятую, необязательно)</label><input id="extra" placeholder="had, is" value="'+esc((data.extra||[]).join(", "))+'">';
      } else if(type==="text"){
        f.innerHTML='<label>ЗАГОЛОВОК (необязательно)</label><input id="ttl" placeholder="My family" value="'+esc(data.title||"")+'">'+
          '<label>ТЕКСТ</label><textarea id="body" rows="6" placeholder="Напиши текст для чтения…">'+esc(data.body||"")+'</textarea>';
      } else if(type==="image"){
        f.innerHTML='<label>КАРТИНКА (ссылка или загрузи файл)</label><div class="imgrow"><input id="url" class="img" placeholder="вставь ссылку или загрузи файл →" value="'+esc(data.url||"")+'"><button class="upl" type="button">📁 файл</button></div><div class="imgprev"></div>'+
          '<label>ПОДПИСЬ (необязательно)</label><input id="caption" placeholder="A cat" value="'+esc(data.caption||"")+'">';
        wireImageIn(f);
      } else if(type==="video"){
        f.innerHTML='<label>ССЫЛКА НА YOUTUBE</label><input id="url" placeholder="https://youtu.be/…" value="'+esc(data.url||"")+'">'+
          '<label>ПОДПИСЬ (необязательно)</label><input id="caption" placeholder="Песенка про цвета" value="'+esc(data.caption||"")+'">';
      } else if(type==="audio"){
        f.innerHTML='<label>ТЕКСТ ДЛЯ ОЗВУЧКИ (английский)</label><textarea id="body" rows="3" placeholder="Listen and repeat: red, blue, green">'+esc(data.body||"")+'</textarea>'+
          '<label>ПОДПИСЬ (необязательно)</label><input id="caption" placeholder="Слушай и повторяй" value="'+esc(data.caption||"")+'">';
      } else if(type==="note"){
        f.innerHTML='<label>ЗАМЕТКА / ПРАВИЛО</label><textarea id="body" rows="4" placeholder="my / his / her — притяжательные местоимения…">'+esc(data.body||"")+'</textarea>';
      }
      if(type!=="image"){
        f.insertAdjacentHTML('beforeend',imageFieldHTML(data.img,"exImg"));
        wireImageIn(f);
      }
    }

    /* ---------- чтение одного блока-вопроса ---------- */
    function readItem(type,b){
      const imgEl=b.querySelector(".img");
      const img=imgEl?imgEl.value.trim():"";
      const hasImg=!!img;
      function ret(data){ if(img) data.img=img; return {data}; }
      if(type==="choice"){
        const q=b.querySelector(".q").value.trim();
        const rows=[...b.querySelectorAll(".opts .optrow")].map(r=>({t:r.querySelector(".otext").value.trim(),c:r.querySelector('input[type=radio]').checked}));
        const kept=rows.filter(x=>x.t);
        if(!q&&!hasImg) return {err:"впиши вопрос или добавь картинку"};
        if(kept.length<2) return {err:"нужно минимум 2 варианта"};
        const correct=kept.findIndex(x=>x.c);
        if(correct<0) return {err:"отметь правильный вариант"};
        return ret({q,opts:kept.map(x=>x.t),correct});
      }
      if(type==="multi"){
        const q=b.querySelector(".q").value.trim();
        const rows=[...b.querySelectorAll(".opts .optrow")].map(r=>({t:r.querySelector(".otext").value.trim(),c:r.querySelector('input[type=checkbox]').checked}));
        const kept=rows.filter(x=>x.t);
        if(!q&&!hasImg) return {err:"впиши вопрос или добавь картинку"};
        if(kept.length<2) return {err:"нужно минимум 2 варианта"};
        const correct=[]; kept.forEach((x,i)=>{ if(x.c) correct.push(i); });
        if(!correct.length) return {err:"отметь хотя бы один правильный"};
        return ret({q,opts:kept.map(x=>x.t),correct});
      }
      if(type==="gap"){
        const q=b.querySelector(".q").value.trim();const answer=b.querySelector(".answer").value.trim();
        if(!q||q.indexOf("___")<0) return {err:"впиши предложение с ___"};
        if(!answer) return {err:"впиши ответ"};
        return ret({q,answer});
      }
      if(type==="order"){
        const answer=b.querySelector(".answer").value.trim();
        if(answer.split(/\s+/).filter(Boolean).length<2) return {err:"впиши предложение из 2+ слов"};
        return ret({answer});
      }
      if(type==="tf"){
        const statement=b.querySelector(".statement").value.trim();
        if(!statement&&!hasImg) return {err:"впиши утверждение или добавь картинку"};
        return ret({statement,correct:b.querySelector(".correct").value==="true"});
      }
      if(type==="listen"){
        const audio=b.querySelector(".audio").value.trim();const answer=b.querySelector(".answer").value.trim();
        if(!audio) return {err:"впиши текст для озвучки"};
        if(!answer) return {err:"впиши ответ"};
        return ret({audio,answer});
      }
      if(type==="cloze"){
        const q=b.querySelector(".q").value.trim();
        if(!/\[\[.*?\]\]/.test(q)) return {err:"добавь хотя бы один пропуск [[a|b]]"};
        return ret({q});
      }
      if(type==="letters"){
        const word=b.querySelector(".word").value.trim();
        if(!word) return {err:"впиши слово"};
        return ret({word,hint:b.querySelector(".hint").value.trim()});
      }
      if(type==="open"){
        const q=b.querySelector(".q").value.trim();
        if(!q&&!hasImg) return {err:"впиши вопрос или добавь картинку"};
        return ret({q,model:b.querySelector(".model").value.trim()});
      }
      return {err:"?"};
    }

    function readForm(type){
      if(type==="embed"){
        const url=document.getElementById("url").value.trim();
        if(!url) return {err:"Вставь ссылку на материал"};
        const e=window.SM_embed(url);
        if(!e) return {err:"Не удалось разобрать ссылку"};
        const h=parseInt(document.getElementById("h").value,10);
        return {data:{url:url,src:e.src,ratio:e.ratio||null,h:(h||e.h||null),name:e.name}};
      }
      if(QREPEAT.has(type)){
        const blocks=[...document.querySelectorAll("#blocks .qblock")];
        const items=[];
        for(let i=0;i<blocks.length;i++){ const r=readItem(type,blocks[i]); if(r.err) return {err:"Задание "+(i+1)+": "+r.err}; items.push(r.data); }
        if(!items.length) return {err:"Добавь хотя бы одно задание"};
        return {data:{items}};
      }
      if(type==="match"){
        const rows=[...document.querySelectorAll("#pairs .optrow")];
        const pairs=rows.map(r=>({a:r.querySelector(".pa").value.trim(),b:r.querySelector(".pb").value.trim()})).filter(p=>p.a&&p.b);
        if(pairs.length<2) return {err:"Нужно минимум 2 пары"};
        return {data:{pairs}};
      }
      if(type==="categorize"){
        const cats=[...document.querySelectorAll("#cats > div")].map(d=>({name:d.querySelector(".cname").value.trim(),items:d.querySelector(".citems").value.split("\n").map(s=>s.trim()).filter(Boolean)})).filter(c=>c.name&&c.items.length);
        if(cats.length<2) return {err:"Нужно 2+ категории со словами"};
        return {data:{cats}};
      }
      if(type==="dialogue"){
        const lines=[...document.querySelectorAll("#lines .optrow")].map(r=>({who:r.querySelector(".who").value.trim()||"•",text:r.querySelector(".dtext").value.trim()})).filter(l=>l.text);
        if(!lines.length) return {err:"Добавь хотя бы одну реплику"};
        return {data:{lines}};
      }
      if(type==="fillbox"){
        const q=document.getElementById("q").value.trim();
        const answers=document.getElementById("answers").value.split(",").map(s=>s.trim()).filter(Boolean);
        const extra=document.getElementById("extra").value.split(",").map(s=>s.trim()).filter(Boolean);
        const gaps=(q.match(/___/g)||[]).length;
        if(!gaps) return {err:"Добавь пропуски ___"};
        if(answers.length!==gaps) return {err:"Слов должно быть столько же, сколько пропусков ("+gaps+")"};
        return {data:{q,answers,extra}};
      }
      if(type==="text"){
        const body=document.getElementById("body").value.trim();
        if(!body) return {err:"Впиши текст"};
        return {data:{title:document.getElementById("ttl").value.trim(),body}};
      }
      if(type==="image"){
        const url=document.getElementById("url").value.trim();
        if(!/^(https?:\/\/|data:image\/)/.test(url)) return {err:"Вставь ссылку на картинку или загрузи файл"};
        return {data:{url,caption:document.getElementById("caption").value.trim()}};
      }
      if(type==="video"){
        const url=document.getElementById("url").value.trim();
        if(!/youtu/.test(url)) return {err:"Вставь ссылку на YouTube"};
        return {data:{url,caption:document.getElementById("caption").value.trim()}};
      }
      if(type==="audio"){
        const body=document.getElementById("body").value.trim();
        if(!body) return {err:"Впиши текст для озвучки"};
        return {data:{body,caption:document.getElementById("caption").value.trim()}};
      }
      if(type==="note"){
        const body=document.getElementById("body").value.trim();
        if(!body) return {err:"Впиши заметку"};
        return {data:{body}};
      }
      return {err:"?"};
    }

    /* ---------- счётчик заданий в упражнении (для списка) ---------- */
    function itemCount(e){
      const d=e.data||{};
      if(d.items) return d.items.length;
      if(d.pairs) return d.pairs.length;
      if(d.cats) return d.cats.length;
      if(d.lines) return d.lines.length;
      return 1;
    }

    /* ---------- экраны ---------- */
    function renderLogin(){
      document.getElementById("sub").textContent="войди как учитель, чтобы создавать упражнения";
      document.getElementById("root").innerHTML='<div class="panel"><div class="empty">Сначала войди в <a href="teacher.html" style="color:#7c2340;text-decoration:underline">кабинет учителя</a>, потом вернись сюда.</div></div>';
    }
    async function renderBuilder(user){
      document.getElementById("sub").textContent=SM_COURSE.emoji+" "+SM_COURSE.title+" · создавай упражнения";
      const unitOpts=SM_UNITS.map(u=>'<option value="'+u.id+'">'+u.emoji+' '+esc(u.title)+'</option>').join("");
      const typeOpts=Object.keys(TYPES).map(k=>'<option value="'+k+'">'+TYPES[k].label+'</option>').join("");
      document.getElementById("root").innerHTML=
        '<div class="panel">'+
          '<div class="row2"><div style="flex:1"><label>ЮНИТ</label><select id="unit">'+unitOpts+'</select></div>'+
          '<div style="flex:1"><label>ТИП</label><select id="type">'+typeOpts+'</select></div></div>'+
          '<label>НАЗВАНИЕ / ИНСТРУКЦИЯ (необязательно)</label><input id="title" placeholder="Прочитай и выбери ответ">'+
          '<label>РАЗДЕЛ УРОКА (необязательно)</label><input id="section" list="seclist" placeholder="Лексика / Грамматика / Видео…"><datalist id="seclist"><option>Лексика</option><option>Грамматика</option><option>Аудирование</option><option>Чтение</option><option>Видео</option><option>Говорение</option><option>Игры</option><option>Домашка</option></datalist>'+
          '<div id="fields"></div>'+
          '<button class="primary" id="save">💾 Сохранить упражнение</button>'+
          '<div class="msg" id="msg"></div>'+
        '</div>'+
        '<div class="sec-title">МОИ УПРАЖНЕНИЯ</div><div id="list"><div class="empty">Загрузка…</div></div>';
      const typeSel=document.getElementById("type");
      typeSel.onchange=()=>{editId=null;document.getElementById("title").value="";renderForm(typeSel.value);};
      renderForm(typeSel.value);
      const pu=new URLSearchParams(location.search).get("u");
      if(pu&&SM_UNITS.some(x=>x.id===pu)) document.getElementById("unit").value=pu;
      document.getElementById("save").onclick=save;
      loadList();
    }
    async function save(){
      const msg=document.getElementById("msg");msg.className="msg";msg.textContent="…";
      const type=document.getElementById("type").value;
      const r=readForm(type); if(r.err){msg.className="msg err";msg.textContent=r.err;return;}
      const exImg=document.getElementById("exImg");
      if(exImg&&exImg.value.trim()&&r.data&&!r.data.items) r.data.img=exImg.value.trim();
      const res=await SM.saveExercise({id:editId,course:SM_COURSE.id,unit_id:document.getElementById("unit").value,type,title:document.getElementById("title").value.trim(),section:document.getElementById("section").value.trim(),data:r.data});
      if(res.ok){const uid=document.getElementById("unit").value;msg.className="msg ok";msg.innerHTML=(editId?"Обновлено ✓":"Сохранено ✓")+' — <a href="exercises.html?u='+uid+'" target="_blank" style="color:inherit;font-weight:800">открыть юнит и проверить →</a>';editId=null;document.getElementById("title").value="";document.getElementById("section").value="";renderForm(type);loadList();}
      else{msg.className="msg err";msg.textContent=res.error||"Ошибка";}
    }
    async function loadList(){
      const list=document.getElementById("list");
      const ex=await SM.myExercises(SM_COURSE.id);
      if(!ex.length){list.innerHTML='<div class="empty">Пока нет упражнений. Создай первое 👆</div>';return;}
      list.innerHTML=ex.map(e=>{const uu=SM_UNITS.find(x=>x.id===e.unit_id);const un=uu?uu.title:e.unit_id;const n=itemCount(e);
        return '<div class="exrow"><span class="badge">'+(TYPES[e.type]?TYPES[e.type].label:e.type)+'</span>'+(e.section?'<span class="cnt">'+esc(e.section)+'</span>':'')+
          (n>1?'<span class="cnt">'+n+' заданий</span>':'')+
          '<span class="t">'+esc(e.title||un)+' · '+esc(un)+'</span>'+
          '<button class="ed" data-id="'+e.id+'">✎</button><button class="de" data-id="'+e.id+'">🗑</button></div>';
      }).join("");
      list.querySelectorAll(".ed").forEach(b=>b.onclick=()=>{const e=ex.find(x=>x.id===b.dataset.id);loadForEdit(e);});
      list.querySelectorAll(".de").forEach(b=>b.onclick=async()=>{if(!confirm("Удалить упражнение?"))return;await SM.deleteExercise(b.dataset.id);loadList();});
      const ep=new URLSearchParams(location.search).get("edit");
      if(ep&&!window.__editHandled){window.__editHandled=true;const e2=ex.find(x=>x.id===ep);if(e2)loadForEdit(e2);}
    }
    function loadForEdit(e){
      editId=e.id;
      document.getElementById("unit").value=e.unit_id;
      document.getElementById("type").value=e.type;
      document.getElementById("title").value=e.title||"";
      document.getElementById("section").value=e.section||"";
      renderForm(e.type,e.data);
      window.scrollTo({top:0,behavior:"smooth"});
      const m=document.getElementById("msg");m.className="msg ok";m.textContent="Редактируешь упражнение — измени и сохрани";
    }

    (async function(){ const u=await SM.getUser(); if(u&&SM.isCloud) renderBuilder(u); else renderLogin(); })();
  </script>
