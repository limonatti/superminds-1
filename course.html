<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Курс · English with Asya</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#f4e9d8;font-family:'Fredoka',sans-serif;color:#1c1310;min-height:100vh}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none}
  .top{display:flex;justify-content:space-between;align-items:center;max-width:860px;margin:0 auto;padding:16px 24px 0}
  .lib{background:#7c2340;color:#fff;padding:9px 16px;border-radius:999px;font:800 14px 'Nunito',sans-serif;box-shadow:0 4px 0 #e3d3ba}
  .cab{background:#fff;color:#7c2340;padding:9px 16px;border-radius:999px;font:800 14px 'Nunito',sans-serif;box-shadow:0 4px 0 #e3d3ba}
  .wrap{max-width:860px;margin:0 auto;padding:24px 24px 60px}
  .head{text-align:center;margin-bottom:30px}
  h1{margin:0;font-size:clamp(30px,6vw,50px);font-weight:700;color:#7c2340;letter-spacing:-1px}
  .sub{font:800 15px 'Nunito',sans-serif;color:#5a4f47;margin:10px 0 0}
  .sections{display:grid;grid-template-columns:1fr 1fr 1fr;gap:22px}
  .sec{background:#fff;border-radius:28px;padding:28px 22px;box-shadow:0 8px 0 #e3d3ba;text-align:center;transition:transform .14s,box-shadow .14s;display:block}
  .sec:hover{transform:translateY(-6px);box-shadow:0 16px 22px rgba(124,35,64,.14)}
  .medal{width:96px;height:96px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:50px;margin:0 auto 16px}
  .m1{background:#e4ebf2}.m2{background:#f6e2cf}.m3{background:#dfeadd}
  .sec .t{font-size:22px;font-weight:700;margin:2px 0 6px}
  .sec .d{font:700 13px 'Nunito',sans-serif;color:#5a4f47;margin-bottom:16px;min-height:40px}
  .go span{background:#7c2340;color:#fff;font:800 14px 'Nunito',sans-serif;padding:10px 22px;border-radius:999px;display:inline-block}
  .tools{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:26px}
  .tbtn{font:800 15px 'Nunito',sans-serif;padding:13px 24px;border-radius:999px;color:#fff;cursor:pointer}
  .board{background:#7c2340;box-shadow:0 6px 0 #5e1a30}
  .dice{background:#e0952a;box-shadow:0 6px 0 #b06a12}
  .foot{text-align:center;font:700 13px 'Nunito',sans-serif;color:#8a7a68;margin-top:40px}
  @media(max-width:720px){.sections{grid-template-columns:1fr}}
</style>
</head>
<body>
  <div class="top">
    <a class="lib" href="index.html">← Все учебники</a>
    <a class="cab" href="cabinet.html">👤 Кабинет</a>
  </div>
  <div class="wrap">
    <div class="head">
      <h1 id="title">Курс</h1>
      <div class="sub" id="sub">выбери раздел</div>
    </div>
    <div class="sections" id="sections"></div>
    <div class="tools">
      <a class="tbtn board" href="board.html">🧑‍🏫 Доска для урока</a>
      <button class="tbtn dice" id="dice">🎲 Случайная игра</button>
    </div>
    <div class="foot">Made for @english.with_asya · англ + рус · для детей 6–8</div>
  </div>

  <script src="words.js"></script>
  <script>
    document.getElementById("title").textContent = SM_COURSE.emoji + " " + SM_COURSE.title;
    document.getElementById("sub").textContent = SM_COURSE.subtitle + " · выбери раздел";

    // Для Super Minds 1 — фирменные страницы; для остальных курсов — общий список юнитов
    const isSM1 = SM_COURSE.id === "sm1";
    const studentHref = isSM1 ? "studentbook.html" : "units.html";
    const workHref    = isSM1 ? "workbook.html"    : "units.html";

    document.getElementById("sections").innerHTML =
      '<a class="sec" href="'+studentHref+'"><div class="medal m1">📕</div>'+
        '<div class="t">Student Book</div><div class="d">Учебник: онлайн-игры, карточки и задания по юнитам</div>'+
        '<div class="go"><span>Открыть →</span></div></a>'+
      '<a class="sec" href="'+workHref+'"><div class="medal m2">📗</div>'+
        '<div class="t">Work Book</div><div class="d">Рабочая тетрадь: печатные листы с грамматикой</div>'+
        '<div class="go"><span>Открыть →</span></div></a>'+
      '<a class="sec" href="trainer.html"><div class="medal m3">🎯</div>'+
        '<div class="t">Тренажёр слов</div><div class="d">Учи слова всех юнитов: карточки и квиз. Прогресс в кабинете</div>'+
        '<div class="go"><span>Учить →</span></div></a>';

    document.getElementById("dice").onclick=function(){
      var u=SM_UNITS.map(function(x){return x.id;});
      location.href="games.html?u="+u[Math.floor(Math.random()*u.length)];
    };
  </script>
</body>
</html>
